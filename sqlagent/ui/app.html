/* ═══════════════════════════════════════════════════════════════════════════
   SETTINGS VIEW
   ═══════════════════════════════════════════════════════════════════════════ */
function SettingsView({addToast}) {
  const [settings, setSettings] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ora_settings')||'{}'); } catch(e) { return {}; }
  });
  const [keyStatus, setKeyStatus] = useState({});
  const [savePulse, setSavePulse] = useState(false);
  const [saveConfirm, setSaveConfirm] = useState('');
  const [envKeys, setEnvKeys] = useState({anthropic: false, openai: false});

  useEffect(() => {
    api.get('/api/settings').then(s => {
      setEnvKeys({anthropic: s._env_anthropic||false, openai: s._env_openai||false});
    }).catch(()=>{});
    // Read currently active model and sync to settings display
    api.get('/api/current-model').then(m => {
      if (m?.active_model && !settings.model) {
        setSettings(s => {
          const ns = {...s, model: m.active_model};
          localStorage.setItem('ora_settings', JSON.stringify(ns));
          return ns;
        });
      }
    }).catch(()=>{});
  }, []);

  const update = (k,v) => setSettings(s => {
    const n={...s,[k]:v};
    localStorage.setItem('ora_settings',JSON.stringify(n));
    // Typing clears verify status so user knows they need to re-verify
    const provider = k==='anthropic_key'?'anthropic':k==='openai_key'?'openai':null;
    if (provider) setKeyStatus(ks=>{ const ns={...ks}; delete ns[provider]; delete ns[provider+'_error']; return ns; });
    return n;
  });

  function clearKey(provider) {
    const field = provider==='anthropic'?'anthropic_key':'openai_key';
    update(field,'');
    setKeyStatus(ks=>{ const ns={...ks}; delete ns[provider]; delete ns[provider+'_error']; return ns; });
  }

  async function verifyKey(provider) {
    const key = provider==='anthropic' ? settings.anthropic_key : settings.openai_key;
    // Allow verifying even when empty — server will test the env var
    if (!key) { addToast('No key stored — paste one first, then Save Settings', 'info'); return; }
    setKeyStatus(s=>({...s,[provider]:'checking'}));
    try {
      const r = await api.post('/api/settings/verify-key', {provider, api_key: key});
      if (r.valid) {
        setKeyStatus(s=>({...s,[provider]:'valid'}));
        addToast((provider==='anthropic'?'Anthropic':'OpenAI')+' key is valid ✓', 'success');
      } else {
        setKeyStatus(s=>({...s,[provider]:'invalid',[provider+'_error']:r.error||'Key rejected by API'}));
        addToast(r.error||'Invalid key — paste a fresh one from the provider dashboard', 'error');
      }
    } catch(ex) {
      setKeyStatus(s=>({...s,[provider]:'invalid',[provider+'_error']:'Network error'}));
      addToast('Could not reach server', 'error');
    }
  }

  function save() {
    api.post('/api/settings', settings).then(r => {
      setSavePulse(true);
      setTimeout(() => setSavePulse(false), 2500);
      // Show model switch confirmation
      const savedModel = r?.model || settings.model || '';
      if (savedModel) {
        const modelLabel = savedModel.includes('sonnet') ? 'Claude Sonnet' : savedModel.includes('opus') ? 'Claude Opus' : savedModel.includes('haiku') ? 'Claude Haiku' : savedModel.includes('gpt-4o-mini') ? 'GPT-4o mini' : savedModel.includes('gpt-4o') ? 'GPT-4o' : savedModel.includes('o1-mini') ? 'o1-mini' : savedModel.split('/').pop();
        setSaveConfirm('✓ Switched to ' + modelLabel + ' — active on next query');
        setTimeout(() => setSaveConfirm(''), 5000);
        // Notify sidebar to refresh
        window.dispatchEvent(new Event('ora_model_changed'));
        if(addToast) addToast('Switched to ' + modelLabel, 'success');
      } else {
        if(addToast) addToast('Settings saved', 'success');
      }
    }).catch(() => { if(addToast) addToast('Save failed', 'error'); });
  }

  function KeyRow({provider, label, placeholder, fieldKey}) {
    const val = settings[fieldKey]||'';
    const st = keyStatus[provider];
    const isEmpty = !val;

    const isInvalid = st === 'invalid';

    return e('div', {style:{marginBottom:20}},
      e('label', {className:'settings-label'}, label),
      e('div', {style:{display:'flex',alignItems:'center',gap:8}},
        e('input', {
          className:'settings-input',
          style:{
            flex:1, margin:0,
            borderColor: isInvalid ? 'rgba(239,68,68,0.5)' : st==='valid' ? 'rgba(34,197,94,0.4)' : undefined,
          },
          type:'password',
          placeholder: isEmpty ? placeholder : undefined,
          value: val,
          onChange: ev=>update(fieldKey,ev.target.value),
          autoComplete:'off',
        }),
        e('button', {
          onClick: ()=>verifyKey(provider),
          disabled: st==='checking',
          style:{
            padding:'6px 14px',fontSize:12,fontWeight:500,whiteSpace:'nowrap',
            background: st==='valid' ? 'rgba(45,157,106,0.10)' : isEmpty ? 'var(--canvas)' : 'rgba(74,144,217,0.10)',
            border: '1px solid '+(st==='valid'?'rgba(34,197,94,0.3)':isEmpty?'rgba(255,255,255,0.1)':'rgba(79,125,249,0.3)'),
            borderRadius:6,
            color: st==='valid' ? '#22c55e' : isEmpty ? '#4a5068' : '#4f7df9',
            cursor: st==='checking'?'not-allowed':'pointer',
            opacity: st==='checking' ? 0.6 : 1,
          }
        }, st==='checking' ? '⟳ Checking…' : st==='valid' ? '✓ Valid' : 'Verify Key'),
        !isEmpty && e('button', {
          onClick:()=>clearKey(provider),
          style:{
            padding:'6px 10px',fontSize:12,
            background: isInvalid ? 'rgba(239,68,68,0.15)' : 'rgba(239,68,68,0.07)',
            border:'1px solid '+(isInvalid?'rgba(239,68,68,0.4)':'rgba(239,68,68,0.2)'),
            borderRadius:6,color:'#ef4444',cursor:'pointer',whiteSpace:'nowrap',fontWeight:500
          }
        }, '✕ Clear'),
      ),
      // States below input
      st==='invalid' && e('div', {style:{
        marginTop:8,padding:'10px 14px',borderRadius:8,
        background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',
        display:'flex',alignItems:'center',justifyContent:'space-between',gap:12
      }},
        e('div', null,
          e('div', {style:{fontSize:12,color:'#ef4444',fontWeight:600,marginBottom:2}},
            '✗ '+(keyStatus[provider+'_error']||'Key rejected by API')
          ),
          e('div', {style:{fontSize:11,color:'#8b92a8'}},
            'This key has expired or is invalid. Clear it and paste a fresh one from ',
            e('a', {
              href: provider==='anthropic' ? 'https://console.anthropic.com/settings/keys' : 'https://platform.openai.com/api-keys',
              target:'_blank', style:{color:'#4f7df9'}
            }, provider==='anthropic' ? 'console.anthropic.com' : 'platform.openai.com'),
          ),
        ),
        e('button', {
          onClick:()=>clearKey(provider),
          style:{
            padding:'6px 14px',fontSize:12,fontWeight:600,whiteSpace:'nowrap',
            background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.35)',
            borderRadius:6,color:'#ef4444',cursor:'pointer',flexShrink:0
          }
        }, '✕ Clear expired key'),
      ),
      isEmpty && e('div',{style:{marginTop:5,fontSize:11,color:'#4a5068'}},
        'Paste your key above → ',
        e('strong',{style:{color:'#8b92a8'}},'Save Settings'),
        ' → ',
        e('strong',{style:{color:'#8b92a8'}},'Verify Key'),
      ),
    );
  }

  return e('div', null,
    e('h2', {style:{fontSize:18,fontWeight:600,marginBottom:16}}, 'Settings'),
    e('div', {className:'card card-static', style:{padding:20}},
      e('div', {className:'settings-section'},
        e('h3', null, 'API Keys'),
        // Both keys expired — show action banner
        (keyStatus.anthropic==='invalid' && keyStatus.openai==='invalid') && e('div', {style:{
          marginBottom:14,padding:'12px 16px',borderRadius:8,

              localStorage.removeItem('ora_settings');
              setSettings({});
              setKeyStatus({});

}

/* ═══════════════════════════════════════════════════════════════════════════
   WORKSPACE PICKER (returning users)
   ═══════════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════════
   SETUP CHAT — conversational workspace creation via Setup Agent
   ═══════════════════════════════════════════════════════════════════════════ */
function SetupChat({workspace, onReady, onBack, user, hasLlmKey, onLlmKeyAdded}) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [sources, setSources] = useState([]);
  const [wsName, setWsName] = useState(workspace?.name || '');
  const [uploading, setUploading] = useState(false);
  const bottomRef = useRef(null);

  // ── Inline key-setup state (shown when no API key is configured) ─────────
  const [keyProvider, setKeyProvider] = useState('anthropic'); // 'anthropic' | 'openai'
  const [keyInput, setKeyInput] = useState('');
  const [keyStatus, setKeyStatus] = useState('idle'); // 'idle'|'testing'|'ok'|'fail'
  const [chosenModel, setChosenModel] = useState('claude-sonnet-4-5'); // model selected during setup
  const [greetingTriggered, setGreetingTriggered] = useState(false);
  // Track whether the USER has personally completed key setup — per workspace.
  // Each new workspace always shows the API key step so the user can confirm
  // or enter their own key. Flag is keyed by workspace_id so returning to an
  // existing workspace skips the step but a fresh workspace always shows it.
  const _keyFlagKey = 'sqlagent_key_setup_done_' + (workspace?.workspace_id || 'default');
  const [keySetupDone, setKeySetupDone] = useState(
    () => localStorage.getItem(_keyFlagKey) === '1'
  );

  // Stream the LLM greeting — called on mount (if key exists) or after key saved
  function streamGreeting() {
    const firstName = (user?.display_name || user?.email?.split('@')[0] || 'there').split(' ')[0];
    setMessages([{role:'agent', text:'', streaming: true}]);
    setLoading(true);

    let fullText = '';
    let cancelled = false;

    fetch(API + '/workspaces/' + workspace.workspace_id + '/setup/greet', {
      method: 'POST',
      headers: api._headers(),
      body: JSON.stringify({user_name: firstName}),
    }).then(resp => {
      if (!resp.ok) {
        setLoading(false);
        setMessages([{role:'agent', text: firstName + ' — what data are we working with today?'}]);
        return;
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      function pump() {
        if (cancelled) return;
        return reader.read().then(({done, value}) => {
          if (done || cancelled) {
            setLoading(false);
            if (!fullText) setMessages([{role:'agent', text: firstName + ' — what data are we working with today?'}]);
            else setMessages([{role:'agent', text: fullText, streaming: false}]);
            return;
          }
          const chunk = decoder.decode(value, {stream: true});
          for (const line of chunk.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') {
              setLoading(false);
              setMessages([{role:'agent', text: fullText || (firstName + ' — what data are we working with today?'), streaming: false}]);
              return;
            }
            try {
              const parsed = JSON.parse(raw);
              if (parsed.text) { fullText += parsed.text; setMessages([{role:'agent', text: fullText, streaming: true}]); }
              if (parsed.error) { setMessages([{role:'agent', text: firstName + ' — what data are we working with today?'}]); setLoading(false); return; }
            } catch(e) {}
          }
          return pump();
        });
      }
      return pump();
    }).catch(() => {
      setLoading(false);
      setMessages([{role:'agent', text: (user?.display_name||'').split(' ')[0]||'Hey' + ' — what data are we working with today?'}]);
    });

    return () => { cancelled = true; };
  }

  // On mount: only skip the key step if the user has PERSONALLY completed it
  // (localStorage flag) AND a server-side key exists. Otherwise, always prompt.
  useEffect(() => {
    if (hasLlmKey === true && keySetupDone && !greetingTriggered) {
      // User has previously set up their key — go straight to greeting
      setGreetingTriggered(true);
      streamGreeting();
    } else if (hasLlmKey !== null && !keySetupDone && !greetingTriggered) {
      // Key setup required (either no server key, or user hasn't gone through setup yet)
      const firstName = (user?.display_name || user?.email?.split('@')[0] || 'there').split(' ')[0];
      setMessages([{role:'agent', text: 'Hi ' + firstName + '! To get started, add your API key below and I\'ll help you connect your data.', streaming: false}]);
    }
  }, [hasLlmKey, keySetupDone]);

  async function saveApiKey() {
    if (!keyInput.trim()) return;
    setKeyStatus('testing');
    try {
      const r = await api.post('/api/settings/verify-key', {provider: keyProvider, api_key: keyInput.trim()});
      if (r.valid) {
        // Persist the key + chosen model via settings endpoint
        const settings = {};
        settings[keyProvider === 'anthropic' ? 'anthropic_key' : 'openai_key'] = keyInput.trim();
        settings.model = chosenModel;
        await api.post('/api/settings', settings);
        setKeyStatus('ok');
        // Mark user as having completed key setup
        localStorage.setItem(_keyFlagKey, '1');
        setKeySetupDone(true);
        // Notify parent so it updates hasLlmKey state, which will trigger greeting
        if (onLlmKeyAdded) onLlmKeyAdded();
        setGreetingTriggered(true);
        // Brief pause so user sees the ✓, then stream greeting
        setTimeout(() => {
          setKeyInput('');
          streamGreeting();
        }, 600);
      } else {
        setKeyStatus('fail');
      }
    } catch(e) {
      setKeyStatus('fail');
    }
  }

  async function uploadFile(file) {
    setUploading(true);
    setMessages(m => [...m, {role:'system', text:'Uploading '+file.name+'...'}]);
    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('workspace_id', workspace.workspace_id);
      const resp = await fetch(API+'/api/upload', {method:'POST', body:formData});
      const data = await resp.json();
      if (data.error) {
        setMessages(m => [...m, {role:'system', text:'⚠ Upload error: '+data.error}]);
      } else {
        setSources(s => [...s, data]);
        const tableInfo = data.tables?.map(t=>t.name+' ('+t.row_count+' rows)').join(', ') || '';
        setMessages(m => [...m, {
          role:'system',
          text:'✓ Uploaded '+data.filename+' — '+data.table_count+' table(s), '+data.column_count+' columns, '+tableInfo
        }]);
        // Auto-derive short workspace name from filename (2-3 words max)
        const baseName = data.filename?.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ') || '';
        if (baseName && (wsName === 'New Workspace' || wsName === '')) {
          // Take first 2-3 meaningful words, skip common suffixes
          const words = baseName.split(' ').filter(w=>w.length>1 && !['analysis','data','report','summary','export','final','v2','v1'].includes(w.toLowerCase()));
          const niceName = words.slice(0,3).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
          if (niceName) {
            setWsName(niceName);
            fetch(API+'/workspaces/'+workspace.workspace_id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:niceName})});
          }
        }
      }
    } catch(err) {
      setMessages(m => [...m, {role:'system', text:'⚠ Upload failed: '+err.message}]);
    }
    setUploading(false);
  }

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  async function send() {
    if (!input.trim() || loading) return;
    const msg = input; setInput(''); setLoading(true);
    // Stop streaming cursor on the greeting when user starts typing
    setMessages(m => m.map(x => x.streaming ? {...x, streaming: false} : x));
    setMessages(m => [...m, {role:'user', text:msg}]);

    try {
      // If sources are already connected and the user message looks like a casual acknowledgment
      // (not a DB URL), just finalize immediately without hitting the LLM
      const isDbUrl = /^(postgresql|mysql|snowflake|bigquery|sqlite|redshift|duckdb):\/\//.test(msg.trim());
      if (sources.length > 0 && !isDbUrl) {
        // Auto-finalize — no LLM round-trip needed
        setMessages(m => [...m, {role:'system', text:'✓ Workspace ready! Redirecting...'}]);
        setTimeout(() => onReady({...workspace, name:wsName, sources}), 800);
        setLoading(false);
        return;
      }

      // Include uploaded sources context so the agent knows what's already connected
      const context = sources.length > 0
        ? '\n[System: User has already uploaded these files: ' + sources.map(s=>s.filename+' ('+s.table_count+' tables, '+s.column_count+' cols)').join(', ') + '. Do NOT ask them to upload again. Help them name the workspace and finalize setup.]'
        : '';
      const r = await api.post('/workspaces/'+workspace.workspace_id+'/setup/chat', {message:msg+context});
      const events = r.events || [];
      for (const ev of events) {
        if (ev.type === 'message' && ev.data?.text) {
          setMessages(m => [...m, {role:'agent', text:ev.data.text}]);
        }
        if (ev.type === 'source_added') {
          setSources(s => [...s, ev.data]);
          setMessages(m => [...m, {role:'system', text:`✓ Connected: ${ev.data.dialect} — ${ev.data.table_count} tables, ${ev.data.column_count} columns`}]);
        }
        if (ev.type === 'action' && ev.data?.action === 'naming') {
          setWsName(ev.data.name || wsName);
        }
        if (ev.type === 'workspace_ready') {
          setMessages(m => [...m, {role:'system', text:'✓ Workspace ready! Redirecting...'}]);
          setTimeout(() => onReady(workspace), 1500);
        }
        if (ev.type === 'error') {
          setMessages(m => [...m, {role:'system', text:'⚠ Error: '+ev.data.error}]);
        }
      }
    } catch(err) {
      setMessages(m => [...m, {role:'system', text:'⚠ Connection error: '+err.message}]);
    }
    setLoading(false);
  }

  return e('div', {style:{display:'flex',flexDirection:'column',height:'100vh',maxWidth:700,margin:'0 auto',padding:'0 20px'}},
    // Header
    e('div', {style:{padding:'20px 0',borderBottom:'1px solid var(--glass-border)',display:'flex',alignItems:'center',gap:12}},
      e('div', {style:{cursor:'pointer',opacity:0.6,fontSize:20}, onClick:onBack}, '←'),
      e('div', null,
        e('div', {style:{fontSize:16,fontWeight:600}}, wsName || 'New Workspace'),
        e('div', {style:{fontSize:12,color:'var(--text-secondary)'}}, sources.length ? sources.length+' sources connected' : 'Setting up...'),
      ),
      sources.length > 0 && e('button', {
        className:'auth-btn auth-btn-primary',
        style:{marginLeft:'auto',width:'auto',padding:'8px 20px'},
        onClick:()=>onReady({...workspace, name:wsName, sources}),
      }, '→ Open Workspace'),
    ),

    // Source badges
    sources.length > 0 && e('div', {style:{display:'flex',gap:8,padding:'12px 0',flexWrap:'wrap'}},
      sources.map((s,i) => e('span', {key:i, className:'badge badge-success'}, '✓ '+s.dialect+' · '+s.table_count+' tables'))
    ),

    // Chat messages
    e('div', {style:{flex:1,overflowY:'auto',padding:'20px 0'}},
      messages.map((msg,i) => {
        if (msg.role === 'user') {
          return e('div', {key:i, style:{display:'flex',justifyContent:'flex-end',marginBottom:12}},
            e('div', {className:'card card-static', style:{padding:'10px 16px',maxWidth:'80%',fontSize:14}}, msg.text),
          );
        }
        if (msg.role === 'system') {
          return e('div', {key:i, style:{marginBottom:12,fontSize:13,color: msg.text.startsWith('✓')?'var(--green-text)':'var(--amber-text)'}}, msg.text);
        }
        // Agent message
        return e('div', {key:i, style:{marginBottom:16}},
          e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:6,display:'flex',alignItems:'center',gap:6}},
            e('span', {style:{width:6,height:6,borderRadius:'50%',background:'var(--blue)',
              animation: msg.streaming && !msg.text ? 'pulse 1.2s ease-in-out infinite' : 'none'}}),
            'Setup Agent',
            msg.streaming && e('span', {style:{fontSize:10,color:'var(--text-muted)',marginLeft:2,animation:'pulse 1.2s ease-in-out infinite'}}, 'thinking...'),
          ),
          e('div', {style:{fontSize:14,lineHeight:1.75,color:'var(--text)'},
            dangerouslySetInnerHTML:{__html: md(msg.text) + (msg.streaming && msg.text ? '<span style="display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:1px;vertical-align:middle;animation:pulse 0.7s ease-in-out infinite"></span>' : '')}
          }),
        );
      }),
      loading && e('div', {style:{display:'flex',alignItems:'center',gap:8,color:'var(--text-muted)',fontSize:13}},
        e('div', {style:{width:14,height:14,border:'2px solid var(--glass-border)',borderTopColor:'var(--blue)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
        'Agent is thinking...',
      ),
      e('div', {ref:bottomRef}),
    ),

    // ── Inline API key setup card (shown until user has completed key setup) ──

/* ═══════════════════════════════════════════════════════════════════════════
   PIPELINE FLOW CANVAS — home screen hero showing how sqlagent works
   Your data sources → Schema → Retrieve → Plan → Generate → Execute → Results
   Animated particles flow left-to-right through the real pipeline stages.
   Hover a stage node for a tooltip. Click anywhere to open Ask view.
   ═══════════════════════════════════════════════════════════════════════════ */
function PipelineFlowCanvas({ workspace, onNavigate }) {
  const canvasRef  = useRef(null);
  const hovRef     = useRef(-1);
  const sourcesRef = useRef([]);           // updated every render, read inside animation loop
  const [hovIdx,  setHovIdx]  = useState(-1);

  // Derive and cache source list for the animation loop via ref
  sourcesRef.current = (workspace?.sources || []).map(s => ({
    source_id: s.filename || s.source_id || 'data',
    dialect:   (s.dialect || s.type || 'csv').toLowerCase(),
  }));

  const STAGES = [
    { label:'Intent',   color:'#4a90d9', desc:'Classifies query complexity — routes simple vs cross-source' },
    { label:'Schema',   color:'#7c5cbf', desc:'CHESS LSH prunes 500 cols → ~8 relevant via RAG retrieval' },
    { label:'Generate', color:'#d4940a', desc:'3 SQL candidates generated in parallel · pairwise LLM ranking' },
    { label:'Correct',  color:'#2d9d6a', desc:'4-layer self-healing: syntax → schema → execution → semantic' },
    { label:'Execute',  color:'#e05577', desc:'Best SQL runs against your live database · read-only enforced' },
    { label:'Format',   color:'#3a7bc8', desc:'NL summary + chart recommendation + follow-up suggestions' },
  ];

  const SRC_COLORS = {
    pg:'#4a90d9',postgres:'#4a90d9',postgresql:'#4a90d9',
    sqlite:'#7c5cbf',mysql:'#00c49f',snowflake:'#29b5e8',
    bigquery:'#4285f4',redshift:'#e05577',
    csv:'#2d9d6a',xlsx:'#2d9d6a',parquet:'#d4940a',
    duckdb:'#9b6cf9',json:'#d4940a',
  };

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf, W = 0, H = 140;
    const particles = [];
    let spawnCD = 0;
    let mouseX = -9999, mouseY = -9999;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      W = Math.max(1, rect.width);
      canvas.width  = W * devicePixelRatio;
      canvas.height = H * devicePixelRatio;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    // Safe roundRect fallback
    function rr(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,   x+w,y+r,   r);
      ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
      ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,   x,y+h-r,   r);
      ctx.lineTo(x,y+r); ctx.arcTo(x,y,     x+r,y,     r);
      ctx.closePath();
    }

    function layout() {
      // Source nodes — left side
      const srcList = sourcesRef.current.length ? sourcesRef.current.slice(0,4) : [
        { source_id:'your_db', dialect:'pg'  },
        { source_id:'data.csv',dialect:'csv' },
      ];
      const nSrc = srcList.length;
      const CY = H / 2;
      const srcX = 48;
      const srcNodes = srcList.map((s,i) => {
        const dl = (s.dialect || s.type || 'csv').toLowerCase().replace('postgresql','pg');
        return {
          x: srcX,
          y: CY + (i - (nSrc-1)/2) * 44,
          label: (s.source_id||'data').split(/[/\\]/).pop().replace(/\.\w+$/,'').substring(0,9),
          badge: dl === 'postgresql' ? 'PG' : dl.toUpperCase().substring(0,3),
          color: SRC_COLORS[dl] || SRC_COLORS.csv,
        };
      });

      // Pipeline stage nodes — horizontally distributed across the canvas
      const stX0 = 110, stX1 = W - 100;
      const gap = (stX1 - stX0) / (STAGES.length - 1);
      const stageNodes = STAGES.map((st,i) => ({
        ...st, x: stX0 + i*gap, y: CY,
      }));

      // Result node — right
      const resX = W - 44, resY = CY;
      return { srcNodes, stageNodes, resX, resY };
    }

    function frame() {
      if (!W) { raf = requestAnimationFrame(frame); return; }
      ctx.clearRect(0, 0, W, H);
      const { srcNodes, stageNodes, resX, resY } = layout();
      const st0 = stageNodes[0], stN = stageNodes[stageNodes.length-1];

      // ── Spawn particle from random source ──────────────────────────────────
      spawnCD--;
      if (spawnCD <= 0) {
        spawnCD = 50 + Math.floor(Math.random() * 40);
        const src = srcNodes[Math.floor(Math.random() * srcNodes.length)];
        // path = waypoints the particle hops through
        const path = [
          [src.x + 30, src.y],
          [st0.x - 30, st0.y],
          ...stageNodes.slice(1).map(s => [s.x, s.y]),
          [resX - 38, resY],
        ];
        particles.push({ path, seg:0, t:0, spd:0.045+Math.random()*0.025, color:src.color });
      }

      // ── Draw connection lines ──────────────────────────────────────────────
      // Sources → first stage (bezier so multiple sources fan in neatly)
      for (const src of srcNodes) {
        const cpx = (src.x+30 + st0.x-30)/2;
        ctx.save();
        ctx.globalAlpha = 0.11;
        ctx.strokeStyle = src.color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3,7]);
        ctx.beginPath();
        ctx.moveTo(src.x+30, src.y);
        ctx.bezierCurveTo(cpx, src.y, cpx, st0.y, st0.x-30, st0.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
      // Stage → stage
      for (let i = 0; i < stageNodes.length-1; i++) {
        const a = stageNodes[i], b = stageNodes[i+1];
        const hv = hovRef.current;
        ctx.save();
        ctx.globalAlpha = (hv===i||hv===i+1) ? 0.38 : 0.12;
        ctx.strokeStyle = a.color;
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([3,6]);
        ctx.beginPath(); ctx.moveTo(a.x+30, a.y); ctx.lineTo(b.x-30, b.y); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
      // Last stage → result
      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = stN.color;
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([3,6]);
      ctx.beginPath(); ctx.moveTo(stN.x+30, stN.y); ctx.lineTo(resX-38, resY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // ── Move + draw particles ──────────────────────────────────────────────
      for (let pi = particles.length-1; pi >= 0; pi--) {
        const p = particles[pi];
        p.t += p.spd;
        if (p.t >= 1) {
          p.t = 0; p.seg++;
          if (p.seg >= p.path.length-1) { particles.splice(pi,1); continue; }
        }
        const [x1,y1] = p.path[p.seg], [x2,y2] = p.path[p.seg+1];
        const px = x1+(x2-x1)*p.t, py = y1+(y2-y1)*p.t;
        const fade = Math.sin(Math.PI * p.t);
        ctx.save();
        ctx.globalAlpha = fade * 0.88;
        ctx.fillStyle   = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // ── Source node boxes ──────────────────────────────────────────────────
      for (const src of srcNodes) {
        const W2=58, H2=24, x=src.x-W2/2, y=src.y-H2/2;
        ctx.save();
        ctx.fillStyle  = '#ffffff';
        ctx.strokeStyle= src.color;
        ctx.lineWidth  = 1.5;
        ctx.shadowColor= src.color+'33'; ctx.shadowBlur=5;
        rr(x,y,W2,H2,5); ctx.fill(); ctx.stroke();
        ctx.shadowBlur=0;
        ctx.fillStyle=src.color;
        ctx.font='600 9px "JetBrains Mono",monospace';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(src.badge, src.x, src.y-4);
        ctx.fillStyle='#888';
        ctx.font='8.5px Inter,sans-serif';
        ctx.fillText(src.label, src.x, src.y+6);
        ctx.restore();
      }

      // ── Stage nodes ────────────────────────────────────────────────────────
      const canvRect = canvas.getBoundingClientRect();
      const lx = mouseX - canvRect.left, ly = mouseY - canvRect.top;
      let newHov = -1;
      for (let i = 0; i < stageNodes.length; i++) {
        const st = stageNodes[i];
        const W2=60, H2=28, x=st.x-W2/2, y=st.y-H2/2;
        const isHov = lx>=x && lx<=x+W2 && ly>=y && ly<=y+H2;
        if (isHov) newHov = i;
        ctx.save();
        ctx.fillStyle  = isHov ? st.color+'1c' : '#ffffff';
        ctx.strokeStyle= isHov ? st.color : '#d4d4d4';
        ctx.lineWidth  = isHov ? 2 : 1.5;
        if (isHov) { ctx.shadowColor=st.color; ctx.shadowBlur=8; }
        rr(x,y,W2,H2,5); ctx.fill(); ctx.stroke();
        ctx.shadowBlur=0;
        ctx.fillStyle= isHov ? st.color : '#3a3a3a';
        ctx.font=`${isHov?'600':'500'} 10px Inter,sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(st.label, st.x, st.y);
        ctx.restore();
      }
      if (newHov !== hovRef.current) { hovRef.current=newHov; setHovIdx(newHov); }

      // ── Result node ────────────────────────────────────────────────────────
      ctx.save();
      ctx.fillStyle  = '#4a90d91a';
      ctx.strokeStyle= '#4a90d9';
      ctx.lineWidth  = 1.5;
      ctx.shadowColor= '#4a90d940'; ctx.shadowBlur=6;
      rr(resX-38, resY-14, 72, 28, 5); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle='#3a7bc8';
      ctx.font='600 10px Inter,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('Results', resX-2, resY);
      ctx.restore();

      raf = requestAnimationFrame(frame);
    }

    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas.parentElement);
    raf = requestAnimationFrame(frame);
    const onMv = ev => { mouseX=ev.clientX; mouseY=ev.clientY; };
    window.addEventListener('mousemove', onMv);

    return () => {
      cancelAnimationFrame(raf);
      ro.disconnect();
      window.removeEventListener('mousemove', onMv);
    };
  }, []);  // run once — layout() reads sourcesRef.current on each frame

  const tip = hovIdx >= 0 ? STAGES[hovIdx] : null;

  return e('div', {
    style: { position:'relative', width:'100%', userSelect:'none' },
    onClick: () => onNavigate && onNavigate('ask'),
  },
    // Section label
    e('div', {style:{
      fontSize:10, fontWeight:600, letterSpacing:'0.08em',
      textTransform:'uppercase', color:'var(--text-muted)', marginBottom:8,
    }}, 'How it works — click to run a query'),

    // Canvas
    e('canvas', {
      ref: canvasRef,
      style: { display:'block', cursor:'pointer', width:'100%', height:'140px' },
    }),

    // Tooltip (appears below the hovered stage)
    e('div', {style:{height:28, display:'flex', alignItems:'center', justifyContent:'center'}},
      tip && e('div', {style:{
        fontSize:11, color:'var(--text-secondary)',
        background:'var(--canvas-elevated)',
        border:'1.5px solid var(--glass-border)',
        borderRadius:5, padding:'3px 12px',
        boxShadow:'0 1px 4px rgba(0,0,0,.06)',
        fontStyle:'italic',
      }}, tip.desc),
    ),
  );
}


/* ═══════════════════════════════════════════════════════════════════════════
   RIGHT PANEL CANVAS — vertical pipeline in its own column, no overlap
   Sources → Schema Linker → SQL Generator → Answer, top-to-bottom.
   ═══════════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════════
   PIPELINE CANVAS — full-width U-shaped animation
   Data Sources (left ↓) → Agent Stack (bottom →) → Pipeline Output (right ↑)
   ═══════════════════════════════════════════════════════════════════════════ */
function RightPanelCanvas() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, raf, lastTime = null;
    const dpr = window.devicePixelRatio || 1;

    function resize() {
      W = canvas.offsetWidth  || canvas.parentElement?.offsetWidth  || 800;
      H = canvas.offsetHeight || canvas.parentElement?.offsetHeight || 420;
      canvas.width  = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      canvas.style.width  = '100%';
      canvas.style.height = '100%';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    const ro = new ResizeObserver(resize);
    ro.observe(canvas.parentElement || canvas);
    resize();

    /* ── Node definitions ──────────────────────────────────────────────────── */
    const DB = [
      { lbl:'PostgreSQL', short:'PG',  col:'#336791' },
      { lbl:'Snowflake',  short:'SF',  col:'#29B5E8' },
      { lbl:'BigQuery',   short:'BQ',  col:'#4285F4' },
      { lbl:'DuckDB',     short:'DK',  col:'#FFA500' },
      { lbl:'MySQL',      short:'MY',  col:'#4479A1' },
      { lbl:'CSV / XLSX', short:'CSV', col:'#22c55e' },
    ];
    const STACK = [
      { lbl:'LangGraph', col:'#e8611a' },
      { lbl:'LangChain', col:'#1c7a5c' },
      { lbl:'LiteLLM',   col:'#7c3aed' },
      { lbl:'Qdrant',    col:'#dc143c' },
    ];
    const OUT = [
      { lbl:'Schema Linker',  sub:'CHESS LSH · M-Schema', col:'#7c5cbf' },
      { lbl:'SQL Generator',  sub:'3 candidates · ranked', col:'#d4940a' },
      { lbl:'Self-Corrector', sub:'ReFoRCE 3-stage loop',  col:'#e05c2f' },
      { lbl:'✓  Answer',      sub:'DataFrame · BIRD 65%+', col:'#4a90d9' },
    ];

    /* ── Animation state ────────────────────────────────────────────────── */
    let t = 0;
    const CYCLE = 11000; // ms per full loop

    /* ── Helpers ────────────────────────────────────────────────────────── */
    function h2r(h) { return h.replace('#','').match(/.{2}/g).map(v => parseInt(v,16)); }

    // Layout: all coordinates derived from current W × H
    function layout() {
      const DR  = 16;               // DB circle radius
      const OW  = 145, OH = 42;    // output box width/height
      const PW  = 72,  PH = 22;    // stack pill width/height
      const PAD = Math.max(20, W * 0.04);

      const lx   = PAD + DR;                  // DB circle center x
      const rx   = W - PAD - OW / 2;          // output box center x
      const topY = H * 0.13;                  // top of both columns
      const botY = H * 0.74;                  // bottom of both columns
      const sy   = H * 0.89;                  // agent-stack row y

      // Left: 6 DB nodes top → bottom
      const leftYs  = DB.map((_,i)  => topY + (botY - topY) * i / (DB.length - 1));
      // Right: 4 output nodes bottom → top (rightYs[0]=bottom, [3]=top)
      const rightYs = OUT.map((_,i) => botY - (botY - topY) * i / (OUT.length - 1));

      // Stack: 4 pills centered, spanning 60% of lx→rx span
      const sc  = (lx + rx) / 2;
      const sw  = Math.min((rx - lx) * 0.60, 500);
      const stackXs = STACK.map((_,i) => sc - sw/2 + sw * i / (STACK.length - 1));

      // Waypoints (16): 6 DB | 1 LC corner | 4 stack | 1 RC corner | 4 OUT
      const LC = { x: stackXs[0],                       y: sy };
      const RC = { x: stackXs[STACK.length - 1],        y: sy };
      const waypoints = [
        ...leftYs.map(y => ({x: lx, y})),   // 0..5
        LC,                                   // 6
        ...stackXs.map(x => ({x, y: sy})),   // 7..10
        RC,                                   // 11
        ...rightYs.map(y => ({x: rx, y})),   // 12..15
      ];
      return { lx, rx, topY, botY, sy, leftYs, rightYs, stackXs, waypoints, DR, OW, OH, PW };
    }

    // Interpolate position along waypoint path
    function ptAt(wp, t) {
      const n = wp.length - 1;
      const s = t * n, i = Math.min(Math.floor(s), n - 1), f = s - i;
      return { x: wp[i].x + (wp[i+1].x - wp[i].x) * f, y: wp[i].y + (wp[i+1].y - wp[i].y) * f };
    }

    // Node glow (0..1) based on particle proximity; wIdx in 0..15
    function glow(wIdx, t) {
      const d   = ((t - wIdx / 15) + 1) % 1;
      const win = 0.055;
      if (d < win)       return 1 - d / win;
      if (d > 1 - win)   return (d - (1 - win)) / win;
      return 0;
    }

    /* ── Draw: section label ─────────────────────────────────────────────── */
    function secLabel(txt, x, y, align) {
      ctx.save();
      ctx.globalAlpha = 0.28; ctx.fillStyle = '#555';
      ctx.font = '500 8px Inter,sans-serif';
      ctx.textAlign = align || 'left'; ctx.textBaseline = 'bottom';
      ctx.fillText(txt.toUpperCase(), x, y);
      ctx.restore();
    }

    /* ── Draw: DB circle ─────────────────────────────────────────────────── */
    function drawDB(x, y, n, g) {
      const r = 16;
      const [rr,gg,bb] = h2r(n.col);
      ctx.save();
      ctx.globalAlpha = 0.6 + g * 0.4;
      if (g > 0.2) { ctx.shadowColor = n.col; ctx.shadowBlur = 18 * g; }
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle   = `rgba(${rr},${gg},${bb},${0.10 + g * 0.18})`; ctx.fill();
      ctx.strokeStyle = `rgba(${rr},${gg},${bb},${0.45 + g * 0.55})`;
      ctx.lineWidth   = 1.5 + g * 0.5; ctx.stroke();
      ctx.shadowBlur  = 0;
      // abbreviation inside
      ctx.fillStyle = n.col; ctx.font = `700 7.5px "JetBrains Mono",monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.short, x, y);
      // full name to the right
      ctx.globalAlpha = 0.42 + g * 0.58;
      ctx.fillStyle = '#1a1a1a'; ctx.font = `500 10px Inter,sans-serif`;
      ctx.textAlign = 'left'; ctx.fillText(n.lbl, x + r + 7, y);
      ctx.restore();
    }

    /* ── Draw: agent-stack pill ──────────────────────────────────────────── */
    function drawStack(x, y, n, g) {
      const pw = 72, ph = 22;
      const [rr,gg,bb] = h2r(n.col);
      ctx.save();
      ctx.globalAlpha = 0.65 + g * 0.35;
      if (g > 0.2) { ctx.shadowColor = n.col; ctx.shadowBlur = 14 * g; }
      ctx.beginPath(); ctx.roundRect(x - pw/2, y - ph/2, pw, ph, 11);
      ctx.fillStyle   = `rgba(${rr},${gg},${bb},${0.07 + g * 0.13})`; ctx.fill();
      ctx.strokeStyle = `rgba(${rr},${gg},${bb},${0.40 + g * 0.60})`;
      ctx.lineWidth   = 1.2; ctx.stroke();
      ctx.shadowBlur  = 0;
      ctx.fillStyle = `rgb(${rr},${gg},${bb})`; ctx.font = `600 9px Inter,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.lbl, x, y);
      ctx.restore();
    }

    /* ── Draw: output node box ───────────────────────────────────────────── */
    function drawOut(cx, y, n, g) {
      const ow = 145, oh = 42, x = cx - ow / 2;
      const [rr,gg,bb] = h2r(n.col);
      ctx.save();
      ctx.globalAlpha = 0.72 + g * 0.28;
      if (g > 0.2) { ctx.shadowColor = n.col; ctx.shadowBlur = 16 * g; }
      ctx.beginPath(); ctx.roundRect(x, y - oh/2, ow, oh, 8);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = `rgba(${rr},${gg},${bb},${0.28 + g * 0.72})`;
      ctx.lineWidth = 1.4; ctx.stroke();
      ctx.shadowBlur = 0;
      // accent top bar
      ctx.beginPath(); ctx.roundRect(x, y - oh/2, ow, 3, [8, 8, 0, 0]);
      ctx.fillStyle = `rgba(${rr},${gg},${bb},${0.55 + g * 0.45})`; ctx.fill();
      // title
      ctx.fillStyle = '#111'; ctx.font = `600 10.5px Inter,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = 0.62 + g * 0.38; ctx.fillText(n.lbl, cx, y - 5);
      // sub
      ctx.fillStyle = '#888'; ctx.font = `400 8px Inter,sans-serif`;
      ctx.globalAlpha = 0.38 + g * 0.32; ctx.fillText(n.sub, cx, y + 9);
      ctx.restore();
    }

    /* ── Draw: connecting dashed lines ───────────────────────────────────── */
    function drawConnections(lo) {
      const { lx, rx, sy, leftYs, rightYs, stackXs, DR, OH, PW } = lo;
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth   = 1.2;
      ctx.setLineDash([3, 9]);

      // Left column: segments between DB nodes
      for (let i = 0; i < leftYs.length - 1; i++) {
        ctx.beginPath();
        ctx.moveTo(lx, leftYs[i]   + DR + 2);
        ctx.lineTo(lx, leftYs[i+1] - DR - 2);
        ctx.stroke();
      }
      // Bezier elbow: last DB → first stack pill
      const lbot = leftYs[leftYs.length - 1] + DR + 2;
      const pLeft = stackXs[0] - PW / 2;
      ctx.beginPath();
      ctx.moveTo(lx, lbot);
      ctx.bezierCurveTo(lx, sy, lx + (pLeft - lx) * 0.5, sy, pLeft, sy);
      ctx.stroke();

      // Stack: horizontal between pills
      for (let i = 0; i < stackXs.length - 1; i++) {
        ctx.beginPath();
        ctx.moveTo(stackXs[i]   + PW/2, sy);
        ctx.lineTo(stackXs[i+1] - PW/2, sy);
        ctx.stroke();
      }
      // Bezier elbow: last stack pill → right column (first output = bottom)
      const pRight = stackXs[stackXs.length - 1] + PW / 2;
      const rtop   = rightYs[0] + OH / 2 + 2;
      ctx.beginPath();
      ctx.moveTo(pRight, sy);
      ctx.bezierCurveTo(pRight + (rx - pRight) * 0.5, sy, rx, sy, rx, rtop);
      ctx.stroke();

      // Right column: segments between output boxes (going up)
      for (let i = 0; i < rightYs.length - 1; i++) {
        ctx.beginPath();
        ctx.moveTo(rx, rightYs[i]   - OH/2 - 2);   // top of lower box
        ctx.lineTo(rx, rightYs[i+1] + OH/2 + 2);   // bottom of upper box
        ctx.stroke();
      }
      ctx.setLineDash([]); ctx.restore();
    }

    /* ── Draw: glowing particle ──────────────────────────────────────────── */
    function drawParticle(pos, t) {
      // colour: blue (left ↓) → orange (bottom →) → purple (right ↑)
      const col = t < 0.40 ? '#4a90d9' : t < 0.73 ? '#e8611a' : '#7c5cbf';
      const [rr,gg,bb] = h2r(col);
      const { x, y } = pos;
      ctx.save();
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 14);
      grad.addColorStop(0,   `rgba(${rr},${gg},${bb},0.92)`);
      grad.addColorStop(0.3, `rgba(${rr},${gg},${bb},0.35)`);
      grad.addColorStop(1,   `rgba(${rr},${gg},${bb},0)`);
      ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.shadowColor = col; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();
      ctx.restore();
    }

    /* ── Frame ───────────────────────────────────────────────────────────── */
    function frame(now) {
      if (!lastTime) lastTime = now;
      const dt = Math.min(now - lastTime, 80);
      lastTime = now;
      t = (t + dt / CYCLE) % 1;

      ctx.clearRect(0, 0, W, H);

      const lo = layout();
      const { lx, rx, topY, sy, leftYs, rightYs, stackXs, waypoints } = lo;

      // Section labels
      secLabel('Data Sources',   lx + 22,       topY - 8,  'left');
      secLabel('Agent Stack',    (lx + rx) / 2, sy   - 14, 'center');
      secLabel('Pipeline Output',rx,             topY - 8,  'right');

      drawConnections(lo);

      // DB nodes    → waypoints 0..5
      DB.forEach((n, i)    => drawDB(lx,        leftYs[i],  n, glow(i,      t)));
      // Stack nodes → waypoints 7..10
      STACK.forEach((n, i) => drawStack(stackXs[i], sy,     n, glow(7 + i,  t)));
      // Output nodes→ waypoints 12..15
      OUT.forEach((n, i)   => drawOut(rx,        rightYs[i], n, glow(12 + i, t)));

      drawParticle(ptAt(waypoints, t), t);

      raf = requestAnimationFrame(frame);
    }

    raf = requestAnimationFrame(frame);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);

  return e('canvas', {
    ref: canvasRef,
    style: {display:'block', width:'100%', height:'100%', pointerEvents:'none'},
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   ORA TYPEWRITER — DynaPuff font, types O→r→a then loops
   ═══════════════════════════════════════════════════════════════════════════ */
function OraTypewriter() {
  const [chars, setChars] = useState(0);
  const full = 'Ora';

  useEffect(() => {
    let timer;
    function tick() {
      setChars(c => {
        if (c < full.length) { timer = setTimeout(tick, 310); return c + 1; }
        timer = setTimeout(() => { setChars(0); timer = setTimeout(tick, 420); }, 1600);
        return c;
      });
    }
    timer = setTimeout(tick, 700);
    return () => clearTimeout(timer);
  }, []);

  const typing = chars < full.length;

  // Each char is always in the DOM — color:transparent preserves its layout
  // space, so the container never changes size and the page never shifts.
  return e('div', {style:{display:'flex', alignItems:'center', justifyContent:'center'}},
    ...[...'Ora'].map((ch, i) => e('span', {key:i, style:{
      fontFamily:'"DynaPuff","Inter",sans-serif',
      fontSize:'clamp(52px,9vw,110px)', fontWeight:400, letterSpacing:'0.05em',
      lineHeight:1, userSelect:'none',
      color: i < chars ? '#1a1a1a' : 'transparent',
    }}, ch)),
    e('span', {style:{
      display:'inline-block', width:3, height:'0.72em',
      background:'#4f7df9', borderRadius:2, marginLeft:6,
      animation:'oraCursor 0.75s ease-in-out infinite',
      opacity: typing ? 1 : 0, transition:'opacity 200ms',
      alignSelf:'center', flexShrink:0,
    }}),
  );
}

  useEffect(() => {

              e('div', {key:'l2'}, e('span', {style:{color:'#44403c'}}, 'db = '), e('span', {style:{color:'#1e40af'}}, 'ora'), e('span', {style:{color:'#78716c'}}, '.'), e('span', {style:{color:'#047857',fontWeight:500}}, 'connect'), e('span', {style:{color:'#78716c'}}, '('), e('span', {style:{color:'#92400e'}}, '"postgresql://localhost/mydb"'), e('span', {style:{color:'#78716c'}}, ')')),

              e('div', {key:'res', style:{marginTop:10,paddingTop:10,borderTop:'1px solid #ddd7cc',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                e('span', {style:{color:'#047857',fontSize:11}}, '✓  DataFrame · 1.2s · $0.003 · BIRD 65%+'),
                e('span', {style:{fontSize:10,color:'#4a7fc0',cursor:'pointer',fontFamily:'var(--font-ui)',padding:'2px 9px',background:'rgba(74,127,192,0.1)',borderRadius:4,border:'1px solid rgba(74,127,192,0.2)'},

              ...['sales="postgresql://prod/sales"','inventory="snowflake://warehouse/inventory"','staff="headcount.csv"'].map((ln,i) => {

              }),

              e('div', {key:'c7', style:{paddingLeft:20}}, e('span', {style:{color:'#44403c'}}, 'result = db.'), e('span', {style:{color:'#047857',fontWeight:500}}, 'ask'), e('span', {style:{color:'#78716c'}}, '('), e('span', {style:{color:'#92400e'}}, '"revenue per employee by store?"'), e('span', {style:{color:'#78716c'}}, ')')),
              e('div', {key:'res', style:{marginTop:10,paddingTop:10,borderTop:'1px solid #ddd7cc',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                e('div', null,
                  e('div', {style:{color:'#047857',fontSize:11}}, '✓  One DataFrame · 3 sources · data never left env'),
                  e('div', {style:{color:'#a0917d',fontSize:10,marginTop:2}}, 'Postgres · Snowflake · CSV  ·  DuckDB synthesis'),
                ),
                e('span', {style:{fontSize:10,color:'#6d4faa',cursor:'pointer',fontFamily:'var(--font-ui)',padding:'2px 9px',background:'rgba(109,79,170,0.08)',borderRadius:4,border:'1px solid rgba(109,79,170,0.18)',flexShrink:0},

/* ═══════════════════════════════════════════════════════════════════════════
   APP — top-level router
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [workspace, setWorkspace] = useState(null);
  const [view, setView] = useState('home');
  const [toasts, setToasts] = useState([]);
  const [authChecked, setAuthChecked] = useState(false);
  const [setupWorkspace, setSetupWorkspace] = useState(null); // workspace being set up
  const [chatMessages, setChatMessages] = useState([]);
  const [hasLlmKey, setHasLlmKey] = useState(null); // null = unknown, true/false after /health
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [cmdkSchema, setCmdkSchema] = useState(null);
  const [cmdkQuery, setCmdkQuery] = useState(null); // pending query from Cmd+K
  const [workspaceChecked, setWorkspaceChecked] = useState(false); // true after initial WS check

  // Global Cmd+K / Ctrl+K keyboard handler
  useEffect(() => {
    function handleGlobalKey(ev) {
      if ((ev.metaKey || ev.ctrlKey) && ev.key === 'k') {
        ev.preventDefault();
        setCmdkOpen(open => !open);
      }
    }
    window.addEventListener('keydown', handleGlobalKey);
    return () => window.removeEventListener('keydown', handleGlobalKey);
  }, []);

  // When a query arrives from Cmd+K, append it to the chat and switch to Ask
  useEffect(() => {
    if (cmdkQuery && workspace) {
      setChatMessages(m => [...m, {role:'user', text:cmdkQuery, _fromCmdK:true}]);
      setCmdkQuery(null);
      setView('ask');
    }
  }, [cmdkQuery, workspace]);

  // Persist chat messages per-workspace to localStorage
  useEffect(() => {
    const wsId = workspace?.workspace_id;
    if (!wsId) return;
    if (chatMessages.length > 0) {
      localStorage.setItem('sqlagent_chat_'+wsId, JSON.stringify(chatMessages.slice(-50)));
    }
  }, [chatMessages, workspace]);

  // Restore chat when workspace changes
  useEffect(() => {
    const wsId = workspace?.workspace_id;
    if (!wsId) { setChatMessages([]); return; }
    try {
      const saved = localStorage.getItem('sqlagent_chat_'+wsId);
      setChatMessages(saved ? JSON.parse(saved) : []);
    } catch(e) { setChatMessages([]); }
  }, [workspace?.workspace_id]);

  const addToast = useCallback((message, type='success') => {
    const id = ++_toastId;
    setToasts(t => [...t, {id, message, type}]);
    setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), 4000);
  }, []);

  // Clean up old global chat key (migrated to per-workspace)
  useEffect(() => { localStorage.removeItem('sqlagent_chat'); }, []);

  // Boot sequence: check if auth is required, then get current user
  useEffect(() => {
    fetch(API + '/health').then(r => r.json()).then(h => {
      const authRequired = h.auth_required === true;  // false by default (open-source mode)
      setHasLlmKey(h.has_llm_key === true);

      if (!authRequired) {
        const savedName = localStorage.getItem('ora_username') || 'You';
        setUser({user_id:'local', display_name: savedName, email:'local@localhost'});
        setAuthChecked(true);
        return;
      }

      api.get('/auth/me').then(u => {
        if (u.user_id) setUser(u);
        setAuthChecked(true);
      }).catch(() => setAuthChecked(true));

    }).catch(() => {
      setHasLlmKey(false);
      setAuthChecked(true);
    });
  }, []);

  if (!authChecked) return e('div', {className:'auth-screen'},
    e('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',gap:12,color:'var(--text-muted)'}},
      e('div', {style:{width:24,height:24,border:'2px solid var(--blue)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
      e('div', {style:{fontSize:13}}, 'Starting…')
    )
  );

  // Auth is required but user has no session → show onboarding
  if (!user) return e(OnboardingFlow, {onComplete: u => {
    const savedName = localStorage.getItem('ora_username');
    if (savedName && !u.display_name) u = {...u, display_name: savedName};
    setUser(u);
  }});

  // Setup chat for new workspace
  if (setupWorkspace) {
    return e('div', null,
      e(SetupChat, {
        workspace: setupWorkspace,
        user: user,
        hasLlmKey: hasLlmKey,
        onLlmKeyAdded: () => setHasLlmKey(true),
        onReady: (ws) => { setSetupWorkspace(null); setWorkspace(ws); },
        onBack: () => {
          // If user arrived via landing page URL params, go back to landing page
          const params = new URLSearchParams(window.location.search);
          if (params.has('create') || params.has('ws')) {
            window.location.href = '/';
          } else {
            setSetupWorkspace(null);
          }
        },
      }),
      e(ToastContainer, {toasts, onRemove:()=>{}}),
    );
  }

  // No workspace selected → picker
  if (!workspace) {
    return e('div', null,
      e(WorkspacePicker, {
        user,
        onSelect: ws => {
          setWorkspace(ws);
          const pending = localStorage.getItem('ora_pending_query');
          if (pending) {
            localStorage.removeItem('ora_pending_query');
            setChatMessages([{role:'user', text: pending}]);
            setView('ask');
          }
        },
        onCreate: async () => {
          const ws = await api.post('/workspaces', {name:'New Workspace', description:'Setting up via agent'});
          setSetupWorkspace(ws);
        },
        onLogout: () => { setUser(null); setWorkspace(null); },
      }),
      e(ToastContainer, {toasts, onRemove:()=>{}}),
    );
  }

  // Workspace active → full layout
  const views = {
    home: e(HomeView, {workspace, onNavigate:setView}),
    ask: e(AskView, {workspace, addToast, messages:chatMessages, setMessages:setChatMessages}),
    data: e(DataView, {workspace, addToast}),
    tasks: e(TasksView, {workspace, onRestoreQuery: (task) => {
      // Restore a past query into the Ask view
      setChatMessages(m => [...m,
        {role:'user', text: task.nl_query},
        {role:'assistant', data: {
          sql: task.sql, succeeded: task.succeeded, row_count: task.row_count,
          nl_response: 'Restored from task ' + task.trace_id,
          error: task.error, winner_generator: task.winner_generator,
          total_tokens: task.total_tokens, latency_ms: task.total_latency_ms,
        }},
      ]);
      setView('ask');
    }}),
    learn: e(LearnView, {addToast, workspace, setView}),
    settings: e(SettingsView, {addToast}),
    agents: e(AgentsView, {workspace}),
  };

  const fullBleed = view === 'data' || view === 'ask';
  return e('div', {className:'layout'},
    e(Sidebar, {view, setView, workspace, user, onBack:()=>{setWorkspace(null);setChatMessages([])}}),
    e('div', {className: fullBleed ? 'main-full' : 'main'}, views[view] || views.home),
    e(ToastContainer, {toasts, onRemove:()=>{}}),
    cmdkOpen && e(CmdKSearch, {
      workspace,
      schema: cmdkSchema,
      onNavigate: v => { setView(v); setCmdkOpen(false); },
      onQuery: q => { setCmdkQuery(q); setCmdkOpen(false); },
      onClose: () => setCmdkOpen(false),
    }),
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ERROR BOUNDARY — catches render-time exceptions, shows fallback instead of
   blank screen. Class component because getDerivedStateFromError is needed.
   ═══════════════════════════════════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError: false, error: null}; }
  static getDerivedStateFromError(err) { return {hasError: true, error: err}; }
  componentDidCatch(err, info) { console.error('[Ora ErrorBoundary]', err, info); }
  render() {
    if (!this.state.hasError) return this.props.children;
    return e('div', {style:{
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      minHeight:'100vh', background:'var(--canvas,#fafaf8)', padding:32, textAlign:'center',
    }},
      e('div', {style:{fontSize:32, marginBottom:16}}, '⚠'),
      e('div', {style:{fontSize:20, fontWeight:600, color:'var(--text,#1a1a2e)', marginBottom:8}},
        'Something went wrong'),
      e('div', {style:{fontSize:14, color:'var(--text-secondary,#666)', marginBottom:24, maxWidth:400, lineHeight:1.6}},
        'An unexpected error occurred. Your data is safe.'),
      e('button', {
        onClick: () => window.location.reload(),
        style:{
          padding:'10px 20px', background:'var(--blue,#4f7df9)', color:'#fff',
          border:'none', borderRadius:8, cursor:'pointer', fontSize:14, fontWeight:500,
        },
      }, 'Reload Ora'),
      this.state.error && e('pre', {style:{
        marginTop:16, fontSize:11, color:'var(--text-secondary,#666)',
        maxWidth:600, overflowX:'auto', textAlign:'left',
        background:'var(--canvas-deep,#f2f2f0)', padding:12, borderRadius:6,
      }}, String(this.state.error)),
    );
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOUNT
   ═══════════════════════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(e(ErrorBoundary, null, e(App)));
</script>
</body>
</html>
