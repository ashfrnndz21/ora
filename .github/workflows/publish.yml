name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on: git tag v2.0.1 && git push --tags

jobs:
  publish:
    name: Build and publish ora-sql
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC — no PyPI API token needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — configure at:
        # https://pypi.org/manage/project/ora-sql/settings/publishing/
        # Publisher: GitHub Actions · repo: ashfrnndz21/ora · workflow: publish.yml
