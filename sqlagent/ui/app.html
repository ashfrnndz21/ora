/* ═══════════════════════════════════════════════════════════════════════════
   ASK VIEW (Chat + Execution Traces + Results)
   ═══════════════════════════════════════════════════════════════════════════ */
function AskView({workspace, addToast, messages: parentMessages, setMessages: setParentMessages}) {
  // Use parent-managed messages if provided (persisted), fallback to local
  const [localMessages, setLocalMessages] = useState([]);
  const messages = parentMessages || localMessages;
  const setMessages = setParentMessages || setLocalMessages;
  const [query, setQuery] = useState('');
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState('ask'); // 'ask' | 'execute'
  const [strategy, setStrategy] = useState('balanced'); // 'fast' | 'balanced' | 'accurate'
  const inputRef = useRef(null);
  const abortRef = useRef(null); // AbortController for in-flight SSE request

  // Cancel any in-flight request when component unmounts
  useEffect(() => () => { if (abortRef.current) abortRef.current.abort(); }, []);

  const STRATEGIES = [
    { id:'fast',     label:'⚡ Fast',     tip:'Single-pass · cheap model · simple queries' },
    { id:'balanced', label:'⚖ Balanced', tip:'Single-pass + correction loop (default)' },
    { id:'accurate', label:'🎯 Accurate', tip:'3 candidates · pairwise rank · complex queries' },
  ];

  async function handleSubmitWithQuery(q) {
    if (!q || !q.trim() || loading) return;
    // Cancel any previous in-flight request
    if (abortRef.current) { abortRef.current.abort(); }
    abortRef.current = new AbortController();
    setQuery(''); setLoading(true);
    setMessages(m => [...m, {role:'user', text:q}]);

    // Use SSE streaming — trace nodes appear one-by-one
    try {
      const resp = await fetch(API+'/query/stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        signal: abortRef.current.signal,
        body: JSON.stringify({
          query:q, workspace_id:workspace?.workspace_id||'',
          strategy,
          // Multi-turn context: include last 3 Q&A pairs
          context: messages.filter(m=>m.role==='user'||m.role==='assistant').slice(-6).map(m=>
            m.role==='user' ? {role:'user', text:m.text} : {role:'assistant', sql:m.data?.sql||'', response:m.data?.nl_response||''}
          ),
        }),
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let traceNodes = [];
      let finalResult = null;

      // Add a placeholder assistant message that we'll update
      const msgIdx = {current: null};
      setMessages(m => { msgIdx.current = m.length; return [...m, {role:'assistant', data:{_streaming:true, _traceNodes:[], succeeded:null}}]; });

      let streamError = null;

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});

        // Parse SSE events from buffer
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        let eventType = '';
        for (const line of lines) {
          if (line.startsWith(':')) { continue; } // SSE comment / keep-alive — ignore
          if (line.startsWith('event: ')) { eventType = line.substring(7).trim(); }
          else if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.substring(6));
              if (eventType === 'trace.node.completed' || eventType === 'trace.node.started') {
                traceNodes = [...traceNodes, data];
                // Update the streaming message with latest trace nodes
                setMessages(m => {
                  const updated = [...m];
                  if (msgIdx.current !== null && updated[msgIdx.current]) {
                    updated[msgIdx.current] = {role:'assistant', data:{_streaming:true, _traceNodes:traceNodes, succeeded:null}};
                  }
                  return updated;
                });
              } else if (eventType === 'query.result') {
                finalResult = data;
              } else if (eventType === 'query.error') {
                // Surface error immediately — don't leave spinner frozen
                streamError = data.error || 'An error occurred';
                setMessages(m => {
                  const updated = [...m];
                  if (msgIdx.current !== null && updated[msgIdx.current]) {
                    updated[msgIdx.current] = {role:'assistant', data:{
                      succeeded: false,
                      error: streamError,
                      _traceNodes: traceNodes,
                      nl_query: q,
                    }};
                  }
                  return updated;
                });
              }
            } catch(e) {}
          }
        }
      }

      // Replace streaming placeholder with final result — attach nl_query for feedback/training
      if (finalResult) {
        setMessages(m => {
          const updated = [...m];
          if (msgIdx.current !== null && updated[msgIdx.current]) {
            updated[msgIdx.current] = {role:'assistant', data:{...finalResult, nl_query: q}};
          }
          return updated;
        });
      } else if (!streamError) {
        // Stream ended with no result and no error — show a generic failure
        setMessages(m => {
          const updated = [...m];
          if (msgIdx.current !== null && updated[msgIdx.current]) {
            const msg = updated[msgIdx.current];
            // Only replace if still in streaming state
            if (msg.data && msg.data._streaming) {
              updated[msgIdx.current] = {role:'assistant', data:{
                succeeded: false,
                error: 'No result received — the agent pipeline ended unexpectedly.',
                _traceNodes: traceNodes,
                nl_query: q,
              }};
            }
          }
          return updated;
        });
      }
    } catch(err) {
      setMessages(m => [...m, {role:'assistant', data:{succeeded:false, error:err.message}}]);
    }
    setLoading(false);
  }

  async function handleSubmit() {
    await handleSubmitWithQuery(query);
  }

  return e('div', {className:'ask-container'},
    messages.length === 0 && !loading && e('div', {className:'ask-empty'},
      e('div', {className:'ask-empty-icon'}, '◎'),
      e('h2', null, 'Ask about your data'),
      e('p', null, 'Natural language to SQL — powered by AI agents'),
      e('div', {className:'ask-chips'},
        ['How many rows in each table?','Describe the data','What patterns exist?'].map(chip =>
          e('div', {key:chip, className:'ask-chip', onClick:()=>handleSubmitWithQuery(chip)}, chip)
        )
      ),
    ),

    messages.map((msg, i) => {
      if (msg.role === 'user') {
        return e('div', {key:i, className:'card card-static', style:{padding:'12px 16px', marginBottom:12, maxWidth:'80%'}},
          e('div', {style:{fontSize:14}}, msg.text),
        );
      }
      return e(ResultBlock, {key:i, data:msg.data||{}, addToast, setQuery, workspace});
    }),

    loading && e('div', {style:{textAlign:'center',padding:24}},
      e('div', {style:{display:'inline-block',width:20,height:20,border:'2px solid var(--glass-border)',borderTopColor:'var(--blue)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
      e('div', {style:{fontSize:13,color:'var(--text-secondary)',marginTop:8}}, 'Running agentic pipeline...'),
    ),

    e('div', {className:'query-input-bar'},
      // ── Strategy selector above input ──────────────────────────────────────
      e('div', {style:{display:'flex',alignItems:'center',gap:6,marginBottom:8,paddingLeft:2}},
        e('span', {style:{fontSize:11,color:'var(--text-muted)',marginRight:4}}, 'Strategy:'),
        ...STRATEGIES.map(s =>
          e('button', {
            key:s.id,
            title:s.tip,
            onClick:()=>setStrategy(s.id),
            style:{
              fontSize:11,fontWeight:500,padding:'3px 10px',borderRadius:100,cursor:'pointer',
              border:'1.5px solid',transition:'all 120ms',fontFamily:'var(--font-ui)',
              background: strategy===s.id ? (s.id==='fast'?'rgba(45,157,106,.1)':s.id==='accurate'?'rgba(224,85,119,.1)':'var(--blue-soft)') : 'transparent',
              color: strategy===s.id ? (s.id==='fast'?'var(--green-text)':s.id==='accurate'?'var(--red-text)':'var(--blue-text)') : 'var(--text-muted)',
              borderColor: strategy===s.id ? (s.id==='fast'?'rgba(45,157,106,.3)':s.id==='accurate'?'rgba(224,85,119,.3)':'rgba(74,144,217,.3)') : 'var(--glass-border)',
            },
          }, s.label)
        ),
        e('span', {style:{fontSize:10,color:'var(--text-muted)',marginLeft:4}},
          STRATEGIES.find(s=>s.id===strategy)?.tip || ''
        ),
      ),
      e('div', {className:'query-input'},
        e('div', {style:{cursor:'pointer',opacity:0.5,display:'flex'}}, e(Icon, {name:'attach', size:18})),
        e('div', {style:{display:'flex',gap:0,marginRight:8}},
          e('div', {style:{padding:'4px 10px',fontSize:12,fontWeight:500,borderRadius:'6px 0 0 6px',background:mode==='ask'?'var(--blue-soft)':'transparent',color:mode==='ask'?'var(--blue-text)':'var(--text-muted)',cursor:'pointer',border:'1px solid var(--glass-border)'}, onClick:()=>setMode('ask')}, 'Ask'),
          e('div', {style:{padding:'4px 10px',fontSize:12,fontWeight:500,borderRadius:'0 6px 6px 0',background:mode==='execute'?'var(--blue-soft)':'transparent',color:mode==='execute'?'var(--blue-text)':'var(--text-muted)',cursor:'pointer',border:'1px solid var(--glass-border)',borderLeft:'none'}, onClick:()=>setMode('execute')}, 'Execute'),
        ),
        e('input', {ref:inputRef, value:query, onChange:ev=>setQuery(ev.target.value), placeholder:mode==='ask'?'Ask anything about your data...':'Enter SQL to execute...', onKeyDown:ev=>{if(ev.key==='Enter')handleSubmit()}, disabled:loading}),
        e('div', {style:{cursor:'pointer',opacity:0.5,display:'flex'}}, e(Icon, {name:'settings', size:16})),
        e('button', {onClick:handleSubmit, disabled:loading||!query.trim()}, e(Icon, {name:'send', size:14})),
      ),
    ),
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   DATA VIEW
   ═══════════════════════════════════════════════════════════════════════════ */
function DataView({workspace, addToast}) {
  const [graph, setGraph] = useState(null);
  const [selected, setSelected] = useState(null);  // selected node
  const [analyzing, setAnalyzing] = useState(false);
  const [positions, setPositions] = useState({});   // node positions for dragging
  const [dragging, setDragging] = useState(null);
  const [analysisInsights, setAnalysisInsights] = useState(null);
  // Schema Chat state
  const [chatMessages, setChatMessages] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [chatLoading, setChatLoading] = useState(false);
  const chatEndRef = useRef(null);
  const canvasRef = useRef(null);
  // Card dimensions — defined here so applyLayout can use them
  const CARD_W = 280;
  const scrollContainerRef = useRef(null);

  // Force-directed layout — spreads nodes with many connections far apart
  function forceLayout(nodeList, edgeList, iterations = 250, layerList) {
    const W = 280, H = 160; // node card size
    const padding = 100;
    const n = Math.max(nodeList.length, 1);
    const cols = Math.ceil(Math.sqrt(n));
    const canvasW = Math.max(900, cols * 420 + 200);
    const canvasH = Math.max(700, Math.ceil(n / cols) * 300 + 200);

    // Group-aware seeding: place nodes in the same entity group near each other
    // Build node → group index map
    const nodeGroup = {};
    (layerList || []).forEach((layer, gi) => {
      (layer.tables || []).forEach(tId => {
        // match by exact id or by name suffix
        nodeList.forEach(nd => {
          if (nd.id === tId || tId.endsWith('.' + nd.name) || nd.id.endsWith('.' + tId.replace(/^tbl:[^.]+\./, ''))) {
            nodeGroup[nd.id] = gi;
          }
        });
      });
    });
    const numGroups = Math.max((layerList || []).length, 1);

    // Init: group-clustered seed positions
    // Each group gets a sector of the canvas; nodes within a group start in a tight cluster
    const pos = {};
    const groupCenters = {};
    for (let gi = 0; gi < numGroups; gi++) {
      const angle = (2 * Math.PI * gi) / numGroups - Math.PI / 2;
      const r = Math.min(canvasW, canvasH) * 0.28;
      groupCenters[gi] = {x: canvasW / 2 + r * Math.cos(angle), y: canvasH / 2 + r * Math.sin(angle)};
    }
    const groupCount = {};
    nodeList.forEach((nd, i) => {
      const gi = nodeGroup[nd.id] ?? -1;
      const center = gi >= 0 ? groupCenters[gi] : {x: canvasW / 2, y: canvasH / 2};
      const idx = groupCount[gi] ?? 0;
      groupCount[gi] = idx + 1;
      const spread = 120;
      const angle = (2 * Math.PI * idx) / Math.max(Object.values(nodeGroup).filter(g => g === gi).length, 1);
      pos[nd.id] = {
        x: center.x + Math.cos(angle) * spread * (gi >= 0 ? 0.6 : 1.5),
        y: center.y + Math.sin(angle) * spread * (gi >= 0 ? 0.6 : 1.5),
      };
    });

    // Build adjacency count for each node
    const degree = {};
    nodeList.forEach(n => { degree[n.id] = 0; });
    edgeList.forEach(e => {
      if (degree[e.source] !== undefined) degree[e.source]++;
      if (degree[e.target] !== undefined) degree[e.target]++;
    });

    for (let iter = 0; iter < iterations; iter++) {
      const cooling = 1 - iter / iterations;
      const step = 120 * cooling + 10;
      const disp = {};
      nodeList.forEach(n => { disp[n.id] = { x: 0, y: 0 }; });

      // Repulsion — push all nodes apart
      for (let i = 0; i < nodeList.length; i++) {
        for (let j = i + 1; j < nodeList.length; j++) {
          const a = nodeList[i], b = nodeList[j];
          const dx = pos[a.id].x - pos[b.id].x;
          const dy = pos[a.id].y - pos[b.id].y;
          const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
          const repulse = 35000 / (dist * dist);
          const fx = (dx / dist) * repulse;
          const fy = (dy / dist) * repulse;
          disp[a.id].x += fx; disp[a.id].y += fy;
          disp[b.id].x -= fx; disp[b.id].y -= fy;
        }
      }

      // Attraction — spring force along edges (rest length = 320px)
      const restLen = 320;
      edgeList.forEach(e => {
        if (!pos[e.source] || !pos[e.target]) return;
        const dx = pos[e.target].x - pos[e.source].x;
        const dy = pos[e.target].y - pos[e.source].y;
        const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
        const force = (dist - restLen) * 0.04;
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        disp[e.source].x += fx; disp[e.source].y += fy;
        disp[e.target].x -= fx; disp[e.target].y -= fy;
      });

      // Gravity — gentle pull toward canvas centre so isolated nodes don't drift to corners
      const gravity = 0.018 * cooling;
      nodeList.forEach(n => {
        disp[n.id].x += (canvasW / 2 - pos[n.id].x) * gravity;
        disp[n.id].y += (canvasH / 2 - pos[n.id].y) * gravity;
      });

      // Apply displacement, clamped by step size + keep in bounds
      nodeList.forEach(n => {
        const d = disp[n.id];
        const len = Math.max(Math.sqrt(d.x * d.x + d.y * d.y), 0.001);
        const clamped = Math.min(len, step);
        pos[n.id].x += (d.x / len) * clamped;
        pos[n.id].y += (d.y / len) * clamped;
        // STRICT bounds — never allow negative coordinates or off-canvas
        pos[n.id].x = Math.max(padding, Math.min(canvasW - W - padding, pos[n.id].x));
        pos[n.id].y = Math.max(padding, Math.min(canvasH - H - padding, pos[n.id].y));
      });
    }

    // Final pass: normalize so min x/y = padding (prevent all-negative drift)
    const xs = Object.values(pos).map(p => p.x);
    const ys = Object.values(pos).map(p => p.y);
    const shiftX = Math.max(0, padding - Math.min(...xs));
    const shiftY = Math.max(0, padding - Math.min(...ys));
    if (shiftX > 0 || shiftY > 0) {
      Object.keys(pos).forEach(id => {
        pos[id].x += shiftX;
        pos[id].y += shiftY;
      });
    }
    return pos;
  }

  function applyLayout(g) {
    const tableNodes = (g?.nodes || []).filter(n => n.type === 'table');
    const edges = g?.edges || [];
    // Run force layout — SVG viewBox handles centering/scaling, no pixel fitting needed here
    const pos = forceLayout(tableNodes, edges, 300, g?.layers || []);
    setPositions(pos);
  }

  useEffect(() => {
    api.get('/schema/graph?workspace_id='+(workspace?.workspace_id||'')).then(g => {
      setGraph(g);
      applyLayout(g);
      if (g?.analyzed) {
        setAnalysisInsights({
          entity_groups: g?.layers || [],
          relationships: (g?.edges || []).map(e => ({
            description:   e.description,
            evidence:      e.evidence,
            confidence:    e.confidence,
            join_columns:  e.join_columns || {},
            from_table:    e.source ? e.source.replace('tbl:','') : '',
            to_table:      e.target ? e.target.replace('tbl:','') : '',
          })),
          glossary: g?.glossary || [],
        });
      }
    });
  }, [workspace?.workspace_id]);

  function handleAnalyze() {
    setAnalyzing(true);
    if (addToast) addToast('Running schema analysis with LLM...', 'success');
    api.post('/schema/analyze', {workspace_id: workspace?.workspace_id || ''}).then(g => {
      setGraph(g);
      applyLayout(g);
      setAnalyzing(false);
      // Extract Schema Agent insights from the KG
      const insights = {
        entity_groups: g?.layers || [],
        relationships: (g?.edges || []).map(e => ({
          description:  e.description,
          evidence:     e.evidence,
          confidence:   e.confidence,
          join_columns: e.join_columns || {},
          from_table:   e.source ? e.source.replace('tbl:','') : '',
          to_table:     e.target ? e.target.replace('tbl:','') : '',
        })),
        glossary: g?.glossary || [],
        summary: g?.analysis_summary || '',
      };
      setAnalysisInsights(insights);
      if (addToast) addToast('Schema analysis complete — ' + (g?.edges?.length || 0) + ' relationships found', 'success');
    }).catch(() => { setAnalyzing(false); });
  }

  // Mouse handlers for dragging nodes
  // Must convert screen pixels → SVG coordinate space (viewBox may be scaled)
  function getSvgScale() {
    const svg = canvasRef.current;
    if (!svg) return 1;
    const bb = svg.getBoundingClientRect();
    const vb = svg.viewBox?.baseVal;
    if (!vb || !bb.width || !vb.width) return 1;
    return bb.width / vb.width; // px-per-SVG-unit
  }
  function onMouseDown(nodeId, ev) {
    ev.preventDefault();
    setDragging({nodeId, startX: ev.clientX, startY: ev.clientY,
      origX: positions[nodeId]?.x || 0, origY: positions[nodeId]?.y || 0,
      scale: getSvgScale()});
  }
  useEffect(() => {
    if (!dragging) return;
    function onMove(ev) {
      const s = dragging.scale || 1;
      const dx = (ev.clientX - dragging.startX) / s;
      const dy = (ev.clientY - dragging.startY) / s;
      setPositions(p => ({...p, [dragging.nodeId]: {x: dragging.origX + dx, y: dragging.origY + dy}}));
    }
    function onUp() { setDragging(null); }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [dragging]);

  // Only show TABLE nodes (filter out column/source nodes from SchemaAgent)
  const nodes = (graph?.nodes || []).filter(n => n.type === 'table');
  const edges = graph?.edges || [];
  const layers = graph?.layers || [];
  const analyzed = graph?.analyzed || false;

  // Compute common prefix ONCE outside any loops
  const allTableNames = nodes.map(n => n.name);
  const commonPrefix = allTableNames.length > 1
    ? allTableNames.reduce((a, b) => {
        let i = 0;
        while (i < a.length && i < b.length && a[i] === b[i]) i++;
        return a.slice(0, i);
      })
    : '';
  // Only strip if prefix ends at a word boundary (underscore)
  const safePrefix = commonPrefix.includes('_')
    ? commonPrefix.slice(0, commonPrefix.lastIndexOf('_') + 1)
    : '';

  // Calculate SVG canvas — fit to actual node positions + padding
  const CARD_H_BASE = 60;
  const allX = nodes.map(n => (positions[n.id]?.x || 0));
  const allY = nodes.map(n => (positions[n.id]?.y || 0));
  // Compute viewBox from actual node bounding box + padding
  // The SVG will use preserveAspectRatio to center + scale this space into the container
  const vbPad = 70;
  const vbMinX = nodes.length ? Math.min(...allX) - vbPad : -vbPad;
  const vbMinY = nodes.length ? Math.min(...allY) - vbPad : -vbPad;
  const vbMaxX = nodes.length ? Math.max(...allX) + CARD_W + vbPad : 900;
  const vbMaxY = nodes.length ? Math.max(...allY) + 280 + vbPad : 700;
  const vbW = Math.max(600, vbMaxX - vbMinX);
  const vbH = Math.max(400, vbMaxY - vbMinY);
  const svgViewBox = `${vbMinX} ${vbMinY} ${vbW} ${vbH}`;

  // Edge colors
  const edgeColor = {declared_fk: '#22c55e', inferred: '#a78bfa', cross_source: '#4f7df9', semantic: '#f59e0b'};

  return e('div', {style:{display:'flex',height:'100vh',gap:0}},
    // ── Canvas area ──
    e('div', {ref:scrollContainerRef, style:{flex:1,minWidth:0,position:'relative',overflow:'hidden',background:'var(--canvas)',display:'flex',flexDirection:'column'}},
      // Top bar
      e('div', {style:{flexShrink:0,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,background:'var(--canvas)',borderBottom:'1px solid var(--glass-border)',zIndex:5}},
        e('h2', {style:{fontSize:16,fontWeight:600,margin:0}}, 'Knowledge Graph'),
        e('span', {style:{fontSize:12,color:'var(--text-secondary)'}}, nodes.length+' tables · '+edges.length+' relationships'),
        analyzed && e('span', {className:'badge badge-success'}, 'Analyzed'),
        !analyzed && e('span', {className:'badge badge-warning'}, 'Basic — run analysis for more'),
        e('div', {style:{marginLeft:'auto',display:'flex',gap:8}},
          e('button', {className:'result-action', onClick:()=>{ applyLayout(graph); }}, 'Auto Layout'),
          e('button', {
            className:'result-action',
            style:{background: analyzing?'var(--glass)':'var(--blue)', color:'white', border:'none'},
            onClick:handleAnalyze, disabled:analyzing,
          }, analyzing ? 'Analyzing...' : 'Run Analysis'),
        ),
      ),

      // SVG Canvas — fills remaining container height, viewBox adapts to node layout
      e('svg', {
        ref:canvasRef,
        viewBox: svgViewBox,
        preserveAspectRatio: 'xMidYMid meet',
        style:{display:'block', flex:1, width:'100%', height:'100%'},
      },
        // Dot grid pattern
        e('defs', null,
          e('pattern', {id:'dotgrid',width:24,height:24,patternUnits:'userSpaceOnUse'},
            e('circle', {cx:12,cy:12,r:0.9,fill:'rgba(0,0,0,0.08)'}),
          ),
          e('filter', {id:'card-shadow'},
            e('feDropShadow', {dx:1,dy:2,stdDeviation:3,floodColor:'rgba(0,0,0,0.10)'}),
          ),
        ),
        e('rect', {width:'100%',height:'100%',fill:'#fafaf8'}),
        e('rect', {width:'100%',height:'100%',fill:'url(#dotgrid)'}),

        // Entity group layers (colored backgrounds + prominent labels)
        // Use suffix/partial match to handle LLM shortening long table names
        layers.map((layer, li) => {
          const layerTableIds = new Set(layer.tables || []);
          const layerNodes = nodes.filter(n => {
            if (layerTableIds.has(n.id)) return true;
            // Partial match: layer table entry ends with node's table name or vice versa
            for (const lt of layerTableIds) {
              if (n.id.endsWith('.' + lt.replace(/^tbl:[^.]+\./, '')) ||
                  lt.endsWith('.' + n.name) || n.name.includes(lt.replace(/^tbl:[^.]+\./, ''))) {
                return true;
              }
            }
            return false;
          });
          if (layerNodes.length === 0) return null;
          const positionedNodes = layerNodes.filter(n => positions[n.id]);
          if (positionedNodes.length === 0) return null;
          const xs = positionedNodes.map(n => positions[n.id].x);
          const ys = positionedNodes.map(n => positions[n.id].y);
          const pad = 28;
          const rx = Math.min(...xs) - pad;
          const ry = Math.min(...ys) - pad - 28;
          const rw = Math.max(...xs) - Math.min(...xs) + CARD_W + pad * 2;
          const rh = Math.max(...ys) - Math.min(...ys) + 160 + pad * 2 + 28;
          const col = layer.color || '#4f7df9';
          return e('g', {key:'layer'+li},
            e('rect', {x:rx, y:ry, width:rw, height:rh, rx:14,
              fill:col+'12', stroke:col+'45', strokeWidth:1.5, strokeDasharray:'6,3'}),
            // Group label pill — larger, more readable
            e('rect', {x:rx+8, y:ry+4, width:Math.min(layer.name.length * 8 + 20, 220), height:20, rx:10,
              fill:col+'30', stroke:col+'60', strokeWidth:1}),
            e('text', {x:rx+18, y:ry+17, fontSize:12, fill:col, fontWeight:600,
              style:{fontFamily:'var(--font-ui)'}}, layer.name),
          );
        }),

        // Edges — bezier curves with prominent join column label
        edges.map((edge, ei) => {
          const sp = positions[edge.source];
          const tp = positions[edge.target];
          if (!sp || !tp) return null;

          const isSelected = selected && (selected.id === edge.source || selected.id === edge.target);

          // Connect from card centers
          const srcCX = sp.x + CARD_W / 2, srcCY = sp.y + 50;
          const tgtCX = tp.x + CARD_W / 2, tgtCY = tp.y + 50;

          // Curve perpendicular to edge direction to reduce overlap
          const dx = tgtCX - srcCX, dy = tgtCY - srcCY;
          const len = Math.sqrt(dx*dx + dy*dy) || 1;
          // Alternate curve direction by edge index to separate parallel edges
          const sign = (ei % 2 === 0) ? 1 : -1;
          const curvature = Math.min(80, len * 0.18) * sign;
          const cpX = (srcCX + tgtCX) / 2 - (dy / len) * curvature;
          const cpY = (srcCY + tgtCY) / 2 + (dx / len) * curvature;

          const color = edgeColor[edge.type] || '#a78bfa';
          const isDashed = edge.type === 'inferred';
          const opacity = isSelected ? 0.9 : (selected ? 0.2 : 0.5);
          const strokeW = isSelected ? 2.5 : 1.5;

          // Extract join columns — prefer specific column names, skip generic dims
          const joinCols = edge.join_columns;
          const genericCols = new Set(['id', 'name', 'type', 'status', 'date', 'created_at']);
          let viaText = '';
          if (joinCols?.from) {
            viaText = joinCols.from;
          } else if (edge.evidence) {
            const match = edge.evidence.match(/Shared columns?: ([^.]+)/)?.[1] ||
                          edge.evidence.match(/via ([^,.(]+)/i)?.[1] || '';
            // Pick the most specific column (not a generic dim)
            const cols = match.split(',').map(s => s.trim()).filter(Boolean);
            viaText = cols.find(c => !genericCols.has(c.toLowerCase())) || cols[0] || '';
          }
          if (viaText.length > 20) viaText = viaText.slice(0, 18) + '…';

          const midX = cpX, midY = cpY; // label at control point = midpoint of curve

          return e('g', {key:'edge'+ei},
            e('path', {
              d: `M${srcCX},${srcCY} Q${cpX},${cpY} ${tgtCX},${tgtCY}`,
              fill:'none', stroke:color, strokeWidth:strokeW, opacity,
              strokeDasharray: isDashed ? '6,4' : 'none',
            }),
            // Arrow at target end
            e('circle', {cx:tgtCX, cy:tgtCY, r:3, fill:color, opacity}),
            // Join column label — only show when not too many edges or edge is selected/highlighted
            viaText && (!selected || isSelected) && e('g', {key:'lbl'},
              e('rect', {
                x: midX - viaText.length * 3.8 - 4, y: midY - 10,
                width: viaText.length * 7.6 + 8, height: 17, rx: 8,
                fill:'rgba(10,15,30,0.92)', stroke: color, strokeWidth: isSelected ? 1 : 0.5,
                opacity: isSelected ? 1 : 0.85,
              }),
              e('text', {x:midX, y:midY+3, fontSize:10, fill:color, textAnchor:'middle',
                style:{fontFamily:'var(--font-mono)', fontWeight:600}}, viaText),
            ),
          );
        }),

        // Arrow marker
        e('defs', null,
          e('marker', {id:'arrowhead',markerWidth:8,markerHeight:6,refX:8,refY:3,orient:'auto'},
            e('polygon', {points:'0 0, 8 3, 0 6', fill:'#4f7df9', opacity:0.6}),
          ),
        ),

        // Table nodes
        nodes.map(node => {
          const pos = positions[node.id] || {x:0, y:0};
          const cols = node.properties?.columns || [];
          const isSelected = selected?.id === node.id;
          const visibleCols = Math.min(cols.length, 7);
          const h = 60 + visibleCols * 20 + (cols.length > 7 ? 18 : 0);
          // Use pre-computed safePrefix from outer scope
          const displayName = safePrefix.length > 5
            ? (node.name.slice(safePrefix.length) || node.name)
            : node.name;
          const shortName = displayName.length > 30 ? displayName.slice(0,28)+'…' : displayName;

          // Edge count badge
          const edgeCount = edges.filter(ed => ed.source === node.id || ed.target === node.id).length;

          return e('g', {key:node.id, transform:`translate(${pos.x},${pos.y})`,
            onMouseDown:ev=>onMouseDown(node.id, ev),
            onClick:ev=>{ev.stopPropagation();setSelected(node)},
            style:{cursor:'grab'},
          },
            // Drop shadow (light — 10% opacity on warm canvas)
            e('rect', {width:CARD_W, height:h, rx:10, fill:'rgba(0,0,0,0.06)',
              transform:'translate(2,2)', style:{filter:'blur(3px)'}}),
            // Card background
            e('rect', {width:CARD_W, height:h, rx:10,
              fill: isSelected ? 'rgba(74,144,217,0.08)' : '#ffffff',
              stroke: isSelected ? '#4a90d9' : '#d4d4d4', strokeWidth: isSelected ? 2 : 1.5,
            }),
            // Header stripe
            e('rect', {width:CARD_W, height:40, rx:10, fill: isSelected ? 'rgba(74,144,217,0.12)' : 'rgba(0,0,0,0.03)'}),
            e('rect', {x:0, y:30, width:CARD_W, height:10, fill: isSelected ? 'rgba(74,144,217,0.12)' : 'rgba(0,0,0,0.03)'}),
            // Table name
            e('text', {x:14, y:24, fontSize:13, fontWeight:600, fill:'#1a1a1a',
              style:{fontFamily:'var(--font-ui)'}}, shortName),
            // Metadata row
            e('text', {x:14, y:38, fontSize:10, fill:'#666666',
              style:{fontFamily:'var(--font-ui)'}},
              (node.properties?.row_count||0).toLocaleString()+' rows · '+(node.properties?.column_count||cols.length)+' cols'
              + (edgeCount > 0 ? ' · '+edgeCount+' links' : '')),
            // Divider
            e('line', {x1:0, y1:44, x2:CARD_W, y2:44, stroke:'rgba(0,0,0,0.08)', strokeWidth:1}),
            // Columns
            ...cols.slice(0, 8).map((col, ci) =>
              e('g', {key:ci, transform:`translate(0,${56 + ci*20})`},
                col.is_pk && e('rect', {x:12, y:-12, width:20, height:14, rx:3, fill:'rgba(74,144,217,0.15)'}),
                col.is_fk && e('rect', {x:12, y:-12, width:20, height:14, rx:3, fill:'rgba(45,157,106,0.15)'}),
                e('text', {x:14, y:0, fontSize:11,
                  fill: col.is_pk ? '#7ba0ff' : col.is_fk ? '#4ade80' : '#6a738a',
                  style:{fontFamily:'var(--font-mono)'}},
                  (col.is_pk ? '⬡ ' : col.is_fk ? '⟶ ' : '  ') + col.name
                ),
                e('text', {x:CARD_W - 6, y:0, fontSize:10, fill:'#999999',
                  textAnchor:'end', style:{fontFamily:'var(--font-mono)'}}, col.data_type||''),
              )
            ),
            cols.length > 8 && e('text', {x:14, y:56+8*20, fontSize:10, fill:'#999999',
              style:{fontFamily:'var(--font-ui)'}}, '+ '+(cols.length-8)+' more columns'),
          );
        }),
      ),
    ),

    // ── Schema Intelligence panel (right side) ──
    e('div', {style:{width:300,minWidth:300,flexShrink:0,borderLeft:'1px solid var(--glass-border)',overflowY:'auto',background:'var(--canvas-deep)',display:'flex',flexDirection:'column'}},
      // Panel header
      e('div', {style:{padding:'12px 16px',borderBottom:'1px solid var(--glass-border)',display:'flex',alignItems:'center',gap:8,flexShrink:0}},
        e('span', {style:{fontSize:13,fontWeight:600,color:'var(--text)'}}, selected ? selected.name.length > 24 ? selected.name.slice(0,22)+'…' : selected.name : 'Schema Intelligence'),
        selected
          ? e('button', {onClick:()=>setSelected(null), style:{marginLeft:'auto',background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16,lineHeight:1,padding:2}}, '×')
          : analysisInsights
            ? e('span', {className:'badge badge-success', style:{marginLeft:'auto',fontSize:10}}, '✓ Analyzed')
            : e('span', {className:'badge badge-warning', style:{marginLeft:'auto',fontSize:10}}, 'Basic'),
      ),

      // ── TABLE SELECTED VIEW ──
      selected && (() => {
        // Reconstruct columns: prefer properties.columns, fall back to col-type KGNodes
        const propCols = selected.properties?.columns || [];
        const colNodes = propCols.length === 0
          ? (graph?.nodes || [])
              .filter(n => n.type === 'column' && n.id.startsWith(`col:${selected.source_id}.${selected.name}.`))
              .map(n => ({
                name: n.name,
                data_type: n.properties?.data_type || '',
                is_pk: n.properties?.is_pk || false,
                is_fk: n.properties?.is_fk || false,
                description: n.properties?.description || '',
              }))
          : propCols;
        return e('div', {style:{padding:16,flex:1,overflowY:'auto'}},
        // Meta row
        e('div', {style:{fontSize:12,color:'var(--text-secondary)',marginBottom:14}},
          (selected.properties?.row_count||0).toLocaleString()+' rows · '+(selected.properties?.column_count||colNodes.length)+' columns'),

        // Entity group badge (if in a layer)
        (() => {
          const layer = (analysisInsights?.entity_groups||[]).find(l => (l.tables||[]).includes(selected.id));
          return layer ? e('div', {style:{marginBottom:12}},
            e('span', {style:{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:500,background:(layer.color||'#4f7df9')+'22',color:layer.color||'#4f7df9',border:'1px solid '+(layer.color||'#4f7df9')+'44'}},
              '⬡ '+layer.name),
            layer.description && e('div', {style:{fontSize:11,color:'var(--text-muted)',marginTop:5,lineHeight:1.5}}, layer.description),
          ) : null;
        })(),

        // Columns (uses colNodes from outer IIFE — handles both analyzed+basic graphs)
        e('div', {style:{fontSize:10,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}},
          'Columns'+(colNodes.length ? ' ('+colNodes.length+')' : '')),
        colNodes.length === 0
          ? e('div', {style:{fontSize:11,color:'var(--text-muted)',fontStyle:'italic',padding:'6px 0'}}, 'No column data — run Analysis for details')
          : e('div', {style:{display:'flex',flexDirection:'column',gap:1,marginBottom:14}},
              ...colNodes.map((col,i) =>
                e('div', {key:i, style:{display:'flex',alignItems:'center',gap:6,padding:'3px 6px',borderRadius:4,background:'rgba(255,255,255,0.02)',fontSize:11,fontFamily:'var(--font-mono)'}},
                  e('span', {style:{flex:1,color: col.is_pk?'var(--blue-text)':col.is_fk?'var(--green-text)':'var(--text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, col.name),
                  e('span', {style:{color:'var(--text-disabled)',fontSize:10,flexShrink:0}}, col.data_type),
                  col.is_pk && e('span', {style:{fontSize:9,padding:'1px 4px',borderRadius:3,background:'var(--blue-soft)',color:'var(--blue-text)',flexShrink:0}}, 'PK'),
                  col.is_fk && e('span', {style:{fontSize:9,padding:'1px 4px',borderRadius:3,background:'var(--green-soft)',color:'var(--green-text)',flexShrink:0}}, 'FK'),
                )
              ),
            ),

        // Relationships for this table — JOIN syntax cards
        (() => {
          const tableEdges = edges.filter(ed => ed.source === selected.id || ed.target === selected.id);
          if (!tableEdges.length) return null;
          const selectedName = safePrefix.length > 5
            ? (selected.name.slice(safePrefix.length) || selected.name)
            : selected.name;
          return e('div', null,
            e('div', {style:{fontSize:10,color:'var(--text-muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}},
              'Relationships ('+tableEdges.length+')'),
            e('div', {style:{display:'flex',flexDirection:'column',gap:8}},
              ...tableEdges.map((ed, i) => {
                const isSource = ed.source === selected.id;
                const otherTableId = isSource ? ed.target : ed.source;
                const otherNode = nodes.find(n => n.id === otherTableId);
                const otherName = otherNode
                  ? (safePrefix.length > 5 ? (otherNode.name.slice(safePrefix.length) || otherNode.name) : otherNode.name)
                  : otherTableId.split('.').pop();
                const color = ed.type === 'declared_fk' ? 'var(--green)' : ed.type === 'cross_source' ? 'var(--blue)' : '#a78bfa';
                const typeLabel = ed.type === 'declared_fk' ? 'FK' : ed.type === 'cross_source' ? 'cross-source' : 'inferred';

                // Extract join columns — all of them, not just first
                const colMatch = (ed.evidence || '').match(/Shared columns?: ([^.]+)/);
                const allCols = colMatch
                  ? colMatch[1].split(',').map(s => s.trim()).filter(s => s.length > 1 && s.length < 30)
                  : ed.join_columns?.from ? [ed.join_columns.from] : [];

                // Build JOIN snippet
                const fromT = isSource ? selectedName : otherName;
                const toT = isSource ? otherName : selectedName;
                const joinCol = allCols[0] || ed.join_columns?.from || '';
                const joinSnippet = joinCol
                  ? `${fromT}.${joinCol} = ${toT}.${joinCol}`
                  : `${fromT} ↔ ${toT}`;

                return e('div', {key: i, style: {
                  borderRadius: 8, overflow: 'hidden',
                  border: '1px solid rgba(255,255,255,0.06)',
                  background: 'rgba(255,255,255,0.02)',
                }},
                  // Header row
                  e('div', {style: {
                    display: 'flex', alignItems: 'center', gap: 6, padding: '7px 10px',
                    borderBottom: allCols.length ? '1px solid rgba(255,255,255,0.04)' : 'none',
                  }},
                    e('span', {style: {width: 7, height: 7, borderRadius: '50%', background: color, flexShrink: 0}}),
                    e('span', {style: {fontSize: 12, fontWeight: 600, color: 'var(--text)',
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}},
                      otherName),
                    e('span', {style: {marginLeft: 'auto', fontSize: 10, padding: '1px 6px',
                      borderRadius: 10, background: color + '20', color, flexShrink: 0}},
                      typeLabel),
                  ),
                  // JOIN snippet
                  allCols.length > 0 && e('div', {style: {padding: '6px 10px', background: 'rgba(0,0,0,0.15)'}},
                    e('div', {style: {fontSize: 10, color: 'var(--text-muted)', marginBottom: 3}},
                      'JOIN ON'),
                    e('div', {style: {fontSize: 11, color: '#a78bfa', fontFamily: 'var(--font-mono)',
                      lineHeight: 1.5, wordBreak: 'break-all'}},
                      allCols.slice(0, 3).map((col, ci) =>
                        e('div', {key: ci}, fromT + '.' + col + ' = ' + toT + '.' + col)
                      ),
                      allCols.length > 3 && e('div', {style: {color: 'var(--text-muted)'}},
                        '+ ' + (allCols.length - 3) + ' more columns'),
                    ),
                  ),
                  // Confidence
                  ed.confidence > 0 && e('div', {style: {
                    padding: '4px 10px', fontSize: 10,
                    color: ed.confidence >= 0.9 ? 'var(--green)' : ed.confidence >= 0.7 ? 'var(--amber)' : 'var(--text-muted)',
                  }},
                    '⬡ ' + Math.round(ed.confidence * 100) + '% confidence',
                  ),
                );
              }),
            ),
          );
        })(),
        ); // close return e('div' wrapper
      })(),  // close selected IIFE

      // ── SCHEMA INTELLIGENCE VIEW (no selection) ──
      !selected && e('div', {style:{padding:16,flex:1,display:'flex',flexDirection:'column',gap:16}},
        // Entity Groups section
        analysisInsights?.entity_groups?.length > 0 && e('div', null,
          e('div', {style:{fontSize:10,color:'var(--text-muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}},
            'Entity Groups ('+analysisInsights.entity_groups.length+')'),
          e('div', {style:{display:'flex',flexDirection:'column',gap:6}},
            ...(analysisInsights.entity_groups).map((grp, gi) =>
              e('div', {key:gi, style:{padding:'8px 10px',borderRadius:6,background:(grp.color||'#4f7df9')+'12',border:'1px solid '+(grp.color||'#4f7df9')+'25'}},
                e('div', {style:{display:'flex',alignItems:'center',gap:6,marginBottom:grp.description?4:0}},
                  e('span', {style:{width:8,height:8,borderRadius:2,background:grp.color||'#4f7df9',flexShrink:0,display:'inline-block'}}),
                  e('span', {style:{fontSize:12,color:'var(--text)',fontWeight:500}}, grp.name),
                  e('span', {style:{marginLeft:'auto',fontSize:10,color:grp.color||'#4f7df9'}}, (grp.tables||[]).length+' tables'),
                ),
                grp.description && e('div', {style:{fontSize:11,color:'var(--text-secondary)',lineHeight:1.4,marginBottom:4}}, grp.description),
                e('div', {style:{display:'flex',flexWrap:'wrap',gap:3}},
                  ...(grp.tables||[]).slice(0,6).map((tid,ti) => {
                    const tn = nodes.find(n=>n.id===tid);
                    const nm = tn ? (safePrefix.length>5?(tn.name.slice(safePrefix.length)||tn.name):tn.name) : tid.replace('tbl:','');
                    return e('span', {key:ti, style:{fontSize:10,padding:'1px 5px',borderRadius:3,background:'rgba(255,255,255,0.06)',color:'var(--text-secondary)',cursor:'pointer'},
                      onClick:()=>setSelected(tn||{id:tid,name:tid.replace('tbl:',''),properties:{}})}, nm);
                  }),
                  (grp.tables||[]).length > 6 && e('span', {style:{fontSize:10,color:'var(--text-muted)'}}, '+'+(grp.tables.length-6)),
                ),
              )
            ),
          ),
        ),

        // Key Relationships section
        analysisInsights?.relationships?.length > 0 && e('div', null,
          e('div', {style:{fontSize:10,color:'var(--text-muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}},
            'Relationships ('+analysisInsights.relationships.length+')'),
          e('div', {style:{display:'flex',flexDirection:'column',gap:4}},
            ...(analysisInsights.relationships).slice(0,8).map((rel, ri) => {
              const ed = edges[ri];
              const confidence = rel.confidence || ed?.confidence;
              const confPct = confidence ? Math.round(confidence*100) : null;
              return e('div', {key:ri, style:{padding:'6px 10px',borderRadius:5,background:'rgba(0,0,0,0.03)',borderLeft:'2px solid #a78bfa'}},
                rel.description && e('div', {style:{fontSize:11,color:'var(--text)',marginBottom:confPct?2:0,lineHeight:1.4}}, rel.description),
                e('div', {style:{fontSize:10,color:'var(--text-muted)',lineHeight:1.3,fontFamily:'var(--font-mono)'}},
                  (() => {
                    // Use join_columns directly (from KGEdge serialization)
                    const jFrom = rel.join_columns?.from;
                    const jTo   = rel.join_columns?.to;
                    if (jFrom) {
                      const col = jFrom === jTo ? jFrom : jFrom + ' / ' + jTo;
                      const link = (rel.from_table||'') + ' → ' + (rel.to_table||'');
                      return link ? link + '  via ' + col : 'via ' + col;
                    }
                    // Fallback: parse from evidence string
                    if (rel.evidence) {
                      const m = rel.evidence.match(/[Ss]hared columns?: ([^.(]+)/);
                      if (m) return 'via ' + m[1].trim().split(',').slice(0,3).join(', ');
                      // Look for "via <col>" pattern
                      const v = rel.evidence.match(/\bvia\s+([\w_, ]+)/i);
                      if (v) return 'via ' + v[1].trim().split(',').slice(0,3).join(', ');
                    }
                    return 'shared key';
                  })()),
                confPct && e('div', {style:{fontSize:10,color:'var(--text-muted)',marginTop:2}}, 'Confidence: '+confPct+'%'),
              );
            }),
            analysisInsights.relationships.length > 8 && e('div', {style:{fontSize:11,color:'var(--text-muted)',textAlign:'center',paddingTop:4}},
              '+ '+(analysisInsights.relationships.length-8)+' more relationships'),
          ),
        ),

        // Business Glossary section
        analysisInsights?.glossary?.length > 0 && e('div', null,
          e('div', {style:{fontSize:10,color:'var(--text-muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}}, 'Glossary'),
          e('div', {style:{display:'flex',flexDirection:'column',gap:4}},
            ...(analysisInsights.glossary).slice(0,6).map((entry, gi) =>
              e('div', {key:gi, style:{padding:'6px 10px',borderRadius:5,background:'rgba(0,0,0,0.03)',border:'1px solid rgba(0,0,0,0.06)'}},
                e('div', {style:{fontSize:12,color:'var(--blue-text)',fontWeight:500,fontFamily:'var(--font-mono)',marginBottom:2}},
                  entry.term||entry.name||''),
                e('div', {style:{fontSize:11,color:'var(--text-secondary)',lineHeight:1.4}},
                  entry.definition||entry.description||''),
              )
            ),
          ),
        ),

        // Analysis summary
        analysisInsights?.summary && e('div', {style:{padding:'8px 10px',borderRadius:6,background:'rgba(79,125,249,0.06)',border:'1px solid rgba(79,125,249,0.15)'}},
          e('div', {style:{fontSize:10,color:'var(--blue-text)',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:500}}, 'Summary'),
          e('div', {style:{fontSize:11,color:'var(--text-secondary)',lineHeight:1.5}}, analysisInsights.summary),
        ),

        // Empty state when no analysis run yet
        !analysisInsights && e('div', {style:{textAlign:'center',paddingTop:32}},
          e('div', {style:{fontSize:32,marginBottom:12}}, '⬡'),
          e('div', {style:{fontSize:13,color:'var(--text-secondary)',marginBottom:6,fontWeight:500}}, 'No analysis yet'),
          e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:16,lineHeight:1.5}},
            'Run Analysis to discover entity groups, relationships, and build the knowledge graph with LLM reasoning.'),
          e('button', {
            style:{padding:'6px 16px',borderRadius:6,background:'var(--blue)',color:'white',border:'none',fontSize:12,fontWeight:500,cursor:'pointer'},
            onClick:handleAnalyze, disabled:analyzing,
          }, analyzing ? 'Analyzing…' : 'Run Analysis'),
        ),

        analysisInsights && e('div', {style:{fontSize:11,color:'var(--text-muted)',textAlign:'center',paddingTop:4}},
          'Click any table to inspect'),
      ),

      // ── SCHEMA CHAT panel — pinned to bottom, always visible ──
      e('div', {style:{
        borderTop:'1px solid var(--glass-border)',
        flexShrink:0,
        display:'flex',
        flexDirection:'column',
        maxHeight:320,
      }},
        // Header
        e('div', {style:{
          padding:'8px 12px',
          display:'flex',
          alignItems:'center',
          gap:6,
          borderBottom:'1px solid rgba(255,255,255,0.04)',
        }},
          e('span', {style:{fontSize:11,fontWeight:600,color:'var(--text)'}}, '⬡ Schema Agent'),
          e('span', {style:{fontSize:10,color:'var(--text-muted)',marginLeft:'auto'}},
            'Q&A feeds SQL Agent'),
        ),
        // Message thread
        chatMessages.length > 0 && e('div', {style:{
          flex:1,
          overflowY:'auto',
          padding:'8px 12px',
          display:'flex',
          flexDirection:'column',
          gap:8,
          maxHeight:180,
        }},
          ...chatMessages.map((msg, mi) =>
            e('div', {key:mi},
              // User bubble
              msg.role === 'user' && e('div', {style:{
                fontSize:11,
                color:'var(--text-secondary)',
                background:'rgba(255,255,255,0.04)',
                borderRadius:'8px 8px 2px 8px',
                padding:'5px 9px',
                marginLeft:20,
                lineHeight:1.4,
              }}, msg.content),
              // Agent answer
              msg.role === 'assistant' && e('div', null,
                e('div', {
                  style:{
                    fontSize:11,
                    color:'var(--text)',
                    background:'rgba(79,125,249,0.08)',
                    border:'1px solid rgba(79,125,249,0.15)',
                    borderRadius:'2px 8px 8px 8px',
                    padding:'6px 9px',
                    marginRight:20,
                    lineHeight:1.5,
                  },
                  dangerouslySetInnerHTML:{__html:md(msg.content||'')},
                }),
                // Glossary saves
                msg.glossary_updates?.length > 0 && e('div', {style:{
                  fontSize:10,
                  color:'var(--green)',
                  marginTop:3,
                  display:'flex',
                  flexWrap:'wrap',
                  gap:4,
                }},
                  ...msg.glossary_updates.map((gu, gi) =>
                    e('span', {key:gi, style:{
                      padding:'1px 6px',
                      borderRadius:10,
                      background:'var(--green-soft)',
                      border:'1px solid rgba(34,197,94,0.2)',
                    }}, '✓ saved: '+gu.term)
                  )
                ),
              ),
            )
          ),
          e('div', {ref:chatEndRef}),
        ),
        chatLoading && e('div', {style:{
          padding:'6px 12px',
          fontSize:11,
          color:'var(--text-muted)',
          fontStyle:'italic',
          display:'flex',
          alignItems:'center',
          gap:6,
        }},
          e('span', {style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--blue)',
            animation:'pulse 1.2s ease-in-out infinite'}}),
          'Schema Agent thinking…'
        ),
        // Input
        e('div', {style:{
          padding:'8px 10px',
          display:'flex',
          gap:6,
          alignItems:'flex-end',
        }},
          e('textarea', {
            value: chatInput,
            onChange: ev => setChatInput(ev.target.value),
            onKeyDown: ev => {
              if (ev.key === 'Enter' && !ev.shiftKey) {
                ev.preventDefault();
                sendSchemaChat();
              }
            },
            placeholder: 'Ask about your schema… e.g. "what does GenAI spend measure?"',
            rows: 2,
            style:{
              flex:1,
              background:'rgba(255,255,255,0.04)',
              border:'1px solid var(--glass-border)',
              borderRadius:8,
              padding:'6px 10px',
              fontSize:11,
              color:'var(--text)',
              resize:'none',
              outline:'none',
              fontFamily:'var(--font-ui)',
              lineHeight:1.4,
            },
          }),
          e('button', {
            onClick: sendSchemaChat,
            disabled: chatLoading || !chatInput.trim(),
            style:{
              padding:'6px 12px',
              borderRadius:8,
              background: chatLoading||!chatInput.trim() ? 'var(--glass)' : 'var(--blue)',
              color: chatLoading||!chatInput.trim() ? 'var(--text-muted)' : 'white',
              border:'none',
              fontSize:12,
              cursor: chatLoading||!chatInput.trim() ? 'not-allowed' : 'pointer',
              fontWeight:500,
              flexShrink:0,
              alignSelf:'flex-end',
            },
          }, '➤'),
        ),
      ),
    ),
  );

  function sendSchemaChat() {
    const msg = chatInput.trim();
    if (!msg || chatLoading) return;
    setChatInput('');
    setChatMessages(prev => [...prev, {role:'user', content:msg}]);
    setChatLoading(true);
    api.post('/schema/chat', {
      message: msg,
      workspace_id: workspace?.workspace_id || '',
    }).then(res => {
      setChatLoading(false);
      setChatMessages(prev => [...prev, {
        role:'assistant',
        content: res.answer || 'No response.',
        glossary_updates: res.glossary_updates || [],
      }]);
      // Refresh graph glossary if new entries were added
      if (res.glossary_updates?.length) {
        if (addToast) addToast('Saved '+res.glossary_updates.length+' glossary term(s) — SQL Agent updated', 'success');
        // Trigger graph reload to pick up new glossary
        api.get('/schema/graph?workspace_id='+(workspace?.workspace_id||'')).then(g => {
          if (g.glossary?.length) {
            setAnalysisInsights(prev => prev ? {...prev, glossary: g.glossary} : prev);
          }
        });
      }
      setTimeout(() => chatEndRef.current?.scrollIntoView({behavior:'smooth'}), 50);
    }).catch(err => {
      setChatLoading(false);
      setChatMessages(prev => [...prev, {role:'assistant', content:'Error: '+err, glossary_updates:[]}]);
    });
  }
}

   ═══════════════════════════════════════════════════════════════════════════ */

    const interval = setInterval(refresh, 8000);

    {
      id: 'sql_agent',

        {name: 'Few-shot SQL Generation', desc: 'RAG-based generation using similar past queries as context', maturity: 'production'},

      ],
      spec: 'agent_id: sql-agent\nversion: 2.0.0\nruntime: LangGraph + LiteLLM\nmodel_backend: claude-sonnet-4-6 (configurable)\ngenerators: [fewshot, plan, decompose]\nmax_corrections: 3\nselection: pairwise_llm_comparison\npolicy: select_only, no_ddl, pii_protection',
      stats: {avgLatency: '8-15s', accuracy: '92%', tokensPer: '~2000'},
    },
    {
      id: 'schema_agent',
      name: 'Schema Agent',
      version: 'v2.0.0',
      status: 'active',
      maturity: 'production',
      description: 'Introspects databases, detects relationships, builds the knowledge graph, and classifies columns.',
      capabilities: [
        {name: 'Live Introspection', desc: 'Connects to any database and extracts tables, columns, types, FKs', maturity: 'production'},
        {name: 'LLM Schema Analysis', desc: 'Classifies columns (identifier, currency, timestamp), infers hidden FKs', maturity: 'production'},
        {name: 'Cross-Source Detection', desc: 'Finds join keys between different databases via exact + semantic matching', maturity: 'beta'},
        {name: 'Knowledge Graph Builder', desc: 'Assembles nodes, edges, and entity group layers', maturity: 'production'},
        {name: 'CHESS LSH Pruning', desc: 'Embedding-based column selection: 500 cols to ~8 relevant per query', maturity: 'production'},
      ],
      spec: 'agent_id: schema-agent\nversion: 2.0.0\npipeline: [structural, sampling, llm_analysis, cross_source, assembly]\nembedder: BAAI/bge-small-en-v1.5 (384d)\npruning: CHESS LSH top-k\nsupported: PostgreSQL, MySQL, SQLite, DuckDB, Snowflake, BigQuery, Redshift, CSV, XLSX',
      stats: {avgLatency: '2-10s', tables: 'unlimited', detectionMethods: '3'},
    },
    {
      id: 'planner',
      name: 'Query Planner',
      version: 'v2.0.0',
      status: 'active',
      maturity: 'production',
      description: 'Assesses query complexity, plans the SQL strategy, and decomposes cross-source questions.',
      capabilities: [
        {name: 'Complexity Assessment', desc: 'Routes simple (1 table) vs moderate (joins) vs complex (cross-source)', maturity: 'production'},
        {name: 'Cross-Source Decomposition', desc: 'Splits questions into sub-queries targeting different databases', maturity: 'production'},
        {name: 'DuckDB Synthesis', desc: 'Joins sub-query results in-memory via DuckDB — data never leaves environment', maturity: 'production'},
        {name: 'Budget Awareness', desc: 'Checks token/cost budget before generation — skips execution if exhausted', maturity: 'production'},
      ],
      spec: 'agent_id: query-planner\nversion: 2.0.0\nrouting: [simple, moderate, complex]\ndecomposition: LLM-powered sub-query planning\nsynthesis: DuckDB in-memory JOIN\nbudget: token_ceiling + cost_ceiling per session',
      stats: {avgLatency: '50-200ms', strategies: '4', parallelism: 'asyncio.gather'},
    },
    {
      id: 'learn_agent',
      name: 'Learn Agent',
      version: 'v2.0.0',
      status: learnStatus?.status === 'active' ? 'active' : 'idle',
      maturity: learnStatus?.auto_learn_enabled !== false ? 'production' : 'beta',
      description: 'Silently trains after every successful query. Evolves your SOUL mental model every 20 queries. Gets smarter without asking.',
      capabilities: [
        {name: 'Auto-Learn', desc: 'Every successful query is automatically saved as a training pair — no thumbs-up needed', maturity: 'production'},
        {name: 'SOUL Evolution', desc: 'Every 20 queries, LLM infers your vocabulary, preferences, and decision patterns', maturity: 'production'},
        {name: 'Thumbs-Up Training', desc: 'Verified positive feedback boosts training pair quality score', maturity: 'production'},
        {name: 'Correction Training', desc: 'User-corrected SQL saved as highest-quality training pair', maturity: 'production'},
        {name: 'QueryHub Packs', desc: 'Community training packs for retail, ecommerce, finance domains', maturity: 'production'},
      ],
      spec: 'agent_id: learn-agent\nversion: 2.0.0\ntrigger: automatic — fires after every successful query\nmemory_tiers: [working, episodic, semantic]\nsoul_evolution_interval: 20 queries\nvector_store: Qdrant (in-process)\ntraining_sources: [auto_learn, user_feedback, queryhub, corrections]',
      stats: (() => {
        if (!learnStatus) return {memoryTiers: '3', soulInterval: '20 queries', packs: '3 bundled'};

          'trained pairs': String(learnStatus.training_pairs || 0),
          'auto-learned': String(learnStatus.auto_learns_total || 0),
          'SOUL evals': learnStatus.soul_evolutions > 0 ? String(learnStatus.soul_evolutions) : '—',

  const maturityColor = {production:'var(--green-text)', beta:'var(--amber-text)', experimental:'var(--text-muted)'};

  return e('div', null,
    e('h2', {style:{fontSize:18,fontWeight:600,marginBottom:4}}, 'Agent Hub'),

    // Agent cards grid
    e('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}},
      agentDefs.map(agent => {

          e('div', {style:{padding:'16px 16px 12px',borderBottom:'1px solid var(--glass-border)'}},

                  e('span', {style:{fontSize:15,fontWeight:600}}, agent.name),

          e('div', {style:{padding:'12px 16px'}},
            e('div', {style:{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}, 'Capabilities'),

              e('div', {key:ci, style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'4px 0',borderBottom:'1px solid rgba(0,0,0,0.03)'}},
                e('div', {style:{flex:1}},
                  e('div', {style:{fontSize:12,fontWeight:500}}, cap.name),
                  isExpanded && e('div', {style:{fontSize:11,color:'var(--text-secondary)',marginTop:2}}, cap.desc),
                ),
                e('span', {style:{fontSize:10,padding:'1px 6px',borderRadius:100,background:maturityBg[cap.maturity],color:maturityColor[cap.maturity],flexShrink:0}}, cap.maturity),
              )
            ),
          ),

  }, [workspace]);

  async function toggleTrace(traceId) {
    if (expandedTask === traceId) { setExpandedTask(null); setTraceDetail(null); return; }

      e('thead', null, e('tr', null,
        ['Task','Query','Status','Tokens','Model','Latency',''].map(h => e('th',{key:h||'actions'},h))
      )),
      e('tbody', null, tasks.map(t => [
        // Task row
        e('tr', {key:t.trace_id, onClick:()=>toggleTrace(t.trace_id), style:{cursor:'pointer',background:expandedTask===t.trace_id?'var(--glass-active)':''}},
          e('td', {style:{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)'}}, t.trace_id?.substring(0,16)),
          e('td', {className:'task-query'}, extractQuestion(t.nl_query)),
          e('td', null, e('span', {className:'badge badge-'+(t.succeeded?'success':'error')}, t.succeeded?'Done':'Failed')),
          e('td', {style:{fontFamily:'var(--font-mono)',fontSize:12}},
            t.tokens_input > 0 || t.tokens_output > 0
              ? e('span', null,
                  e('span', {style:{color:'rgba(79,125,249,0.85)'}}, '↑'+(t.tokens_input||0).toLocaleString()),
                  ' ',
                  e('span', {style:{color:'rgba(34,197,94,0.85)'}}, '↓'+(t.tokens_output||0).toLocaleString()),
                )
              : (t.total_tokens||0).toLocaleString(),
          ),
          e('td', null, (() => {
            const mid = t.model_id || '';

            const label = mid.includes('sonnet') ? 'Sonnet' : mid.includes('opus') ? 'Opus' : mid.includes('haiku') ? 'Haiku' : mid.includes('gpt-4o-mini') ? '4o-mini' : mid.includes('gpt-4o') ? 'GPT-4o' : mid.split('/').pop().split('-').slice(0,2).join('-');
            const color = mid.startsWith('claude') ? '#c084fc' : mid.startsWith('gpt') || mid.startsWith('o1') ? '#22c55e' : '#f59e0b';
            return e('span', {style:{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,padding:'1px 7px',borderRadius:10,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)'}},
              e('span', {style:{width:5,height:5,borderRadius:'50%',background:color,flexShrink:0}}),
              e('span', {style:{fontFamily:'var(--font-mono)',color:'var(--text-secondary)'}}, label),

          e('td', null,

              ),

              traceDetail?.root?.children ? traceDetail.root.children.map((node, ni) => {
                const status = node.status === 'completed' ? 'PASS' : 'FAIL';

                  (node.detail?.thinking || node.summary) && e('div', {style:{color:'var(--text-muted)',paddingLeft:28}},

                    e('div', {key:ci, style:{paddingLeft:28}},

                      e('span', {style:{color:'var(--text-secondary)'}}, child.name || child.summary),

                  ),

              }) : e('div', {style:{color:'var(--text-muted)'}}, 'Loading trace...'),
              // Summary
              traceDetail && e('div', {style:{marginTop:8}},
                e('span', {style:{color:'var(--green-text)'}},

                  (traceDetail.total_latency_ms||0)+'ms | '+
                  (traceDetail.correction_rounds||0)+' corrections | '+
                  'generator: '+(traceDetail.winner_generator||'—'),

                e('div', {style:{marginTop:4,display:'flex',gap:16,flexWrap:'wrap'}},
                  e('span', {style:{color:'var(--text-muted)',fontSize:11}},
                    'tokens ',
                    e('span', {style:{color:'rgba(79,125,249,0.9)'}}, '↑'+(traceDetail.tokens_input||0).toLocaleString()),
                    ' ',
                    e('span', {style:{color:'rgba(34,197,94,0.9)'}}, '↓'+(traceDetail.tokens_output||0).toLocaleString()),
                    ' total:'+(traceDetail.total_tokens||0).toLocaleString(),
                  ),
                  traceDetail.model_id && e('span', {style:{color:'var(--text-muted)',fontSize:11}},
                    'model: ', e('span', {style:{color:'#c084fc'}}, traceDetail.model_id),
                  ),
                ),
              ),
            ),
          ),
        ),
      ])),
    ),
  );
}

// Helper to map trace node to a type label like the reference image
function _traceNodeType(node) {
  const map = {
    'Understanding your question': 'routing',
    'Finding relevant tables and columns': 'schema:prune',
    'Looking for similar past queries': 'memory:retrieval',
    'Planning the SQL approach': 'inference:plan',
    'Writing SQL candidates': 'inference:generate',
    'Running the query': 'executor',
    'Fixing and retrying': 'correction',
    'Generating your answer': 'inference:respond',
    'Updating memory': 'memory:write',
    'Breaking into sub-questions': 'decompose',
    'Running sub-queries in parallel': 'executor:parallel',
    'Combining results': 'synthesis',
  };
  return map[node.name] || node.agent || 'agent';
}

/* Individual row in the train-from-history list — manages its own trained state */
function TrainHistoryList({tasks, addToast, refreshLearnStatus}) {
  const [trainedMap, setTrainedMap] = useState({}); // trace_id → {sql, nl_query}
  const [trainingMap, setTrainingMap] = useState({}); // trace_id → bool

  async function trainItem(t) {
    const tid = t.trace_id || t.nl_query;
    if (trainedMap[tid] || trainingMap[tid]) return;
    setTrainingMap(m => ({...m, [tid]: true}));
    try {
      await api.post('/train/sql', {nl_query: t.nl_query, sql: t.sql, source: 'history'});
      setTrainedMap(m => ({...m, [tid]: {nl_query: t.nl_query, sql: t.sql}}));
      if (addToast) addToast('Registered: "' + extractQuestion(t.nl_query).substring(0,40) + '…"', 'success');
      if (refreshLearnStatus) refreshLearnStatus();
    } catch(e) {
      if (addToast) addToast('Failed to register training pair', 'error');
    } finally {
      setTrainingMap(m => ({...m, [tid]: false}));
    }
  }

  return e('div', null,
    tasks.map((t, i) => {
      const tid = t.trace_id || t.nl_query;
      const trained = trainedMap[tid];
      const training = trainingMap[tid];
      const mid = t.model_id || '';
      const modelLabel = mid.includes('sonnet') ? 'Sonnet' : mid.includes('opus') ? 'Opus'
        : mid.includes('haiku') ? 'Haiku' : mid.includes('gpt-4o-mini') ? '4o-mini'
        : mid.includes('gpt-4o') ? 'GPT-4o' : mid ? mid.split('/').pop().split('-')[0] : '';
      const modelColor = mid.startsWith('claude') ? '#c084fc' : mid.startsWith('gpt') ? '#22c55e' : '#f59e0b';

      return e('div', {key:tid+i},
        // Main row
        e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',
          padding:'8px 0', borderBottom: trained ? 'none' : '1px solid var(--glass-border)', gap:8}},
          e('div', {style:{flex:1,minWidth:0}},
            e('div', {style:{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
              color: trained ? '#c084fc' : 'var(--text)'}},
              extractQuestion(t.nl_query)
            ),
            e('div', {style:{display:'flex',alignItems:'center',gap:6,marginTop:2}},
              e('div', {style:{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}},
                (t.sql||'').substring(0,60) + ((t.sql||'').length > 60 ? '…' : ''),
              ),
              modelLabel && e('span', {style:{fontSize:10,padding:'1px 6px',borderRadius:8,
                background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)',
                color:modelColor,flexShrink:0,fontFamily:'var(--font-mono)'}}, modelLabel),
            ),
          ),
          trained
            ? e('span', {style:{
                fontSize:11,padding:'3px 10px',borderRadius:8,flexShrink:0,
                background:'rgba(192,132,252,0.1)',border:'1px solid rgba(192,132,252,0.25)',
                color:'#c084fc',fontWeight:500,
              }}, '✦ Registered')
            : e('button', {
                className:'result-action', onClick:()=>trainItem(t),
                disabled:training,
                style:{flexShrink:0, opacity: training ? 0.6 : 1},
              }, training ? 'Saving…' : 'Register as Example'),
        ),

        // Expanded "what was registered" — shown after training
        trained && e('div', {style:{
          padding:'8px 12px', marginBottom:8,
          borderRadius:'0 0 8px 8px',
          background:'rgba(192,132,252,0.04)',
          border:'1px solid rgba(192,132,252,0.12)',
          borderTop:'none',
        }},
          e('div', {style:{display:'flex',alignItems:'flex-start',gap:6,fontSize:12}},
            e('span', {style:{color:'#c084fc',flexShrink:0,marginTop:1}}, '✦'),
            e('div', null,
              e('div', {style:{color:'var(--text-secondary)',marginBottom:4}},
                'Registered as training pair — the Learn Agent will retrieve this when similar questions are asked:'
              ),
              e('div', {style:{
                padding:'6px 8px',borderRadius:6,
                background:'rgba(0,0,0,0.04)',fontFamily:'var(--font-mono)',fontSize:11,
                color:'var(--text)',border:'1px solid rgba(0,0,0,0.06)',
                display:'flex',gap:8,alignItems:'flex-start',
              }},
                e('span', {style:{color:'var(--text-muted)',flexShrink:0}}, 'Q:'),
                e('span', {style:{color:'#c084fc',flex:1}}, extractQuestion(trained.nl_query)),
              ),
              e('div', {style:{
                padding:'6px 8px',borderRadius:6,marginTop:4,
                background:'rgba(0,0,0,0.04)',fontFamily:'var(--font-mono)',fontSize:11,
                color:'var(--text)',border:'1px solid rgba(0,0,0,0.06)',
                display:'flex',gap:8,alignItems:'flex-start',overflow:'hidden',
              }},
                e('span', {style:{color:'var(--text-muted)',flexShrink:0}}, 'SQL:'),
                e('span', {style:{color:'#22c55e',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
                  (trained.sql||'').trim().substring(0,120),
                ),
              ),
            ),
          ),
        ),
      );
    })
  );
}

function LearnView({addToast, workspace, setView}) {
  const [packs, setPacks] = useState([]);
  const [installed, setInstalled] = useState({});
  const [tasks, setTasks] = useState([]);
  const [trainNl, setTrainNl] = useState('');
  const [trainSql, setTrainSql] = useState('');
  const [learnStatus, setLearnStatus] = useState(null);
  const [trainSaving, setTrainSaving] = useState(false);
  const [trainSaved, setTrainSaved] = useState(false);
  const [expandedLesson, setExpandedLesson] = useState(null);  // lesson_id

  const wsId = workspace?.workspace_id || '';

  function refreshLearnStatus() {
    api.get('/api/learn/status?workspace_id='+wsId).then(setLearnStatus).catch(()=>{});
  }

  useEffect(() => {
    api.get('/hub/packs').then(d=>setPacks(d.packs||[]));
    if(workspace?.workspace_id) api.get('/workspaces/'+workspace.workspace_id+'/tasks?limit=20').then(d=>setTasks(d.tasks||[]));
    refreshLearnStatus();
    const t = setInterval(refreshLearnStatus, 6000);
    return () => clearInterval(t);
  }, [workspace]);

  async function installPack(name) {
    setInstalled(s=>({...s,[name]:'installing'}));
    try {
      const r = await api.post('/hub/install',{pack_name:name});
      setInstalled(s=>({...s,[name]:'done'}));
      if(addToast) addToast('Installed '+name+' ('+r.installed+' examples)','success');
      refreshLearnStatus();
    } catch(e) { setInstalled(s=>({...s,[name]:'error'})); }
  }

  async function addTrainingPair() {
    if(!trainNl.trim() || !trainSql.trim() || trainSaving) return;
    setTrainSaving(true); setTrainSaved(false);
    try {
      await api.post('/train/sql', {nl_query:trainNl, sql:trainSql});
      setTrainSaved(true);
      if(addToast) addToast('Training pair saved','success');
      setTrainNl(''); setTrainSql('');
      refreshLearnStatus();
      setTimeout(() => setTrainSaved(false), 3000);
    } catch(e) { if(addToast) addToast('Failed to save','error'); }
    finally { setTrainSaving(false); }
  }

  async function deleteLesson(lessonId) {
    try {
      await api.del('/api/learn/lessons/'+lessonId);
      refreshLearnStatus();
      if(addToast) addToast('Lesson removed','success');
    } catch(e) { if(addToast) addToast('Failed to remove lesson','error'); }
  }

  const sl = learnStatus;
  const lessons = sl?.lesson_records || [];
  const succeeded = tasks.filter(t=>t.succeeded);
  const STAGE_LABEL = {schema:'Schema pruning',retrieval:'Example retrieval',planning:'Planning',generation:'SQL generation',filtering:'Filter logic'};

  return e('div', null,
    e('h2', {style:{fontSize:18,fontWeight:600,marginBottom:4}}, 'Learning'),
