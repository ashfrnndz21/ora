version: "3.8"

services:
  sqlagent:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SQLAGENT_MODEL=${SQLAGENT_MODEL:-claude-sonnet-4-6}
    volumes:
      - sqlagent-data:/root/.sqlagent
    command: >
      python -m sqlagent.cli serve
      --model ${SQLAGENT_MODEL:-claude-sonnet-4-6}
      --port 8080

volumes:
  sqlagent-data:
