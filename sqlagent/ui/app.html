<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ora — Speak to your database.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
  integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
  integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
  crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
  integrity="sha384-NrKB+u6Ts6AtkIhwPixiKTzgSKNblyhlk0Sohlgar9UHUBzai/sgnNNWWd291xqt"
  crossorigin="anonymous"></script>
<style>
/* ── DynaPuff display font (Ora wordmark only) ──────────────────────────── */
@font-face {
  font-family: 'DynaPuff';
  src: url('/ui/DynaPuff-Variable.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DynaPuff';
  src: url('/ui/DynaPuff-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@keyframes oraCursor {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}
/* ═══════════════════════════════════════════════════════════════════════════
   LIGHT WORKSPACE DESIGN SYSTEM — Warm Paper + Clean Borders
   Inspired by: the-modern-ai-platform.html (#fafaf8) + Dribbble node canvas
   ═══════════════════════════════════════════════════════════════════════════ */
:root {
  /* ── Canvas ── */
  --canvas:          #fafaf8;          /* warm off-white — the defining tone  */
  --canvas-deep:     #f2f2f0;          /* sidebar, deepest surfaces           */
  --canvas-elevated: #ffffff;          /* cards, inputs, code blocks          */

  /* ── Surface (replaces glass) — solid, no blur ── */
  --glass:           #ffffff;
  --glass-border:    #d4d4d4;          /* 2px solid everywhere, no glow       */
  --glass-hover:     #f5f4f0;
  --glass-active:    #eeecea;

  /* ── Text ── */
  --text:            #1a1a1a;
  --text-secondary:  #555555;
  --text-muted:      #999999;
  --text-disabled:   #cccccc;

  /* ── Accent palette (from the-modern-ai-platform) ── */
  --blue:            #4a90d9;
  --blue-glow:       rgba(74,144,217,.15);
  --blue-soft:       rgba(74,144,217,.10);
  --blue-text:       #3a7bc8;
  --indigo:          #7c5cbf;
  --green:           #2d9d6a;
  --green-soft:      rgba(45,157,106,.10);
  --green-text:      #2a8d5e;
  --amber:           #d4940a;
  --amber-soft:      rgba(212,148,10,.10);
  --amber-text:      #b87e08;
  --red:             #e05577;
  --red-soft:        rgba(224,85,119,.10);
  --red-text:        #c8385f;

  --font-ui:   'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;

  /* sharper corners — matches the Dribbble reference */
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px; --radius-xl: 10px;

  --sidebar-width:  220px;
  --context-width:  300px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-ui);
  background: var(--canvas);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
#root { min-height: 100vh; }

/* ── Subtle dot grid on main canvas (dark dots, light bg — like Dribbble ref) */
.main {
  background-image: radial-gradient(circle, rgba(0,0,0,.06) 1px, transparent 1px);
  background-size: 24px 24px;
  background-color: var(--canvas);
}

/* ── Card — solid white, 2px border, hairline shadow ── */
.card {
  background: var(--canvas-elevated);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  transition: border-color 150ms ease, box-shadow 150ms ease;
}
.card:hover { border-color: #bdbdbd; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
.card-static:hover { border-color: var(--glass-border); box-shadow: 0 1px 3px rgba(0,0,0,.06); }

/* ── Status badges — solid borders, flat fill ── */
.badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; border: 1.5px solid; }
.badge-success { background: var(--green-soft);  color: var(--green-text);  border-color: rgba(45,157,106,.25); }
.badge-warning { background: var(--amber-soft);  color: var(--amber-text);  border-color: rgba(212,148,10,.25); }
.badge-error   { background: var(--red-soft);    color: var(--red-text);    border-color: rgba(224,85,119,.25); }
.badge-info    { background: var(--blue-soft);   color: var(--blue-text);   border-color: rgba(74,144,217,.25); }

/* ── Layout ── */
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-width);
  background: var(--canvas-deep);
  border-right: 2px solid var(--glass-border);
  padding: 20px 12px;
  display: flex; flex-direction: column;
  position: fixed; height: 100vh; z-index: 10;
}
.main      { margin-left: var(--sidebar-width); flex: 1; padding: 24px 32px; min-height: 100vh; }
.main-full { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; padding: 0; overflow: hidden; display: flex; flex-direction: column; }

/* ── Sidebar nav ── */
.sidebar-logo      { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.sidebar-logo-icon { width: 24px; height: 24px; background: linear-gradient(135deg, var(--blue), var(--indigo)); border-radius: 6px; }
.sidebar-logo-text { font-family: 'DynaPuff', 'Inter', sans-serif; font-size: 15px; font-weight: 400; color: var(--text); letter-spacing: 0.02em; }
.sidebar-workspace { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-meta      { font-size: 11px; color: var(--text-muted); margin-bottom: 20px; }
.sidebar-section   { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 12px; margin: 16px 0 8px; }

.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  color: var(--text-secondary); font-size: 13px; border-radius: var(--radius-md);
  cursor: pointer; transition: all 120ms; position: relative; user-select: none;
}
.nav-item:hover  { color: var(--text); background: var(--glass-hover); }
.nav-item.active { color: var(--blue-text); background: var(--blue-soft); font-weight: 500; }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 3px; background: var(--blue); border-radius: 0 2px 2px 0;
}
.nav-icon { width: 16px; height: 16px; opacity: 0.5; }
.nav-item.active .nav-icon { opacity: 1; }
.sidebar-bottom { margin-top: auto; }
.sidebar-status { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); padding: 8px 12px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

/* ── Auth / Onboarding ── */
.auth-screen   { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--canvas); }
.auth-card     { width: 420px; padding: 40px; text-align: center; }
.auth-title    { font-size: 24px; font-weight: 700; margin: 20px 0 8px; color: var(--text); }
.auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

.ob-steps  { display: flex; justify-content: center; gap: 6px; margin-bottom: 32px; }
.ob-dot    { width: 6px; height: 6px; border-radius: 50%; background: var(--glass-border); transition: background 200ms; }
.ob-dot.active { background: var(--blue); width: 20px; border-radius: 3px; }
.ob-dot.done   { background: var(--green); }

.model-cards      { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; text-align: left; }
.model-card       { padding: 14px; border-radius: var(--radius-md); border: 1.5px solid var(--glass-border); background: var(--canvas-elevated); cursor: pointer; transition: all 150ms; }
.model-card:hover { border-color: #aaa; background: var(--glass-hover); }
.model-card.selected { border-color: var(--blue); background: var(--blue-soft); box-shadow: 0 0 0 1px var(--blue); }
.model-card-name  { font-size: 13px; font-weight: 600; margin-bottom: 3px; color: var(--text); }
.model-card-desc  { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
.model-card-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-top: 6px; border: 1px solid; }

.key-input-row            { display: flex; gap: 8px; margin-bottom: 10px; }
.key-input-row .auth-input { margin-bottom: 0; flex: 1; }

.auth-btn {
  width: 100%; padding: 12px; border-radius: var(--radius-md);
  border: 1.5px solid var(--glass-border);
  background: var(--canvas-elevated); color: var(--text);
  font-size: 14px; font-family: var(--font-ui);
  cursor: pointer; margin-bottom: 12px; transition: all 150ms;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.auth-btn:hover         { background: var(--glass-hover); border-color: #aaa; }
.auth-btn-primary       { background: var(--blue); border-color: var(--blue); color: #fff; }
.auth-btn-primary:hover { background: #3a7bc8; border-color: #3a7bc8; }

.auth-input {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-md);
  border: 1.5px solid var(--glass-border);
  background: var(--canvas-elevated); color: var(--text);
  font-size: 14px; font-family: var(--font-ui);
  outline: none; margin-bottom: 12px;
}
.auth-input:focus       { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
.auth-input::placeholder { color: var(--text-muted); }

/* ── Home View ── */
.home-header    { margin-bottom: 24px; }
.home-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.home-header p  { font-size: 13px; color: var(--text-secondary); }
.kpi-grid  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.kpi-card  { padding: 16px; }
.kpi-value { font-size: 28px; font-weight: 700; line-height: 1.2; color: var(--text); }
.kpi-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.grid-2    { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── Ask View ── */
.ask-container  { max-width: 800px; margin: 0 auto; }
.ask-empty      { text-align: center; padding: 80px 0; }
.ask-empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.25; }
.ask-empty h2   { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.ask-empty p    { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
.ask-chips      { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.ask-chip {
  padding: 7px 16px; border-radius: 100px; font-size: 13px;
  background: var(--canvas-elevated); border: 1.5px solid var(--glass-border);
  cursor: pointer; color: var(--text-secondary); transition: all 120ms;
}
.ask-chip:hover { border-color: var(--blue); color: var(--blue-text); background: var(--blue-soft); }

/* query input bar — floats at bottom */
.query-input-bar {
  position: sticky; bottom: 0; padding: 16px 0;
  background: linear-gradient(transparent, var(--canvas) 30%);
}
.query-input {
  display: flex; align-items: center; gap: 8px;
  background: var(--canvas-elevated);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 10px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  transition: border-color 150ms;
}
.query-input:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
.query-input input {
  flex: 1; background: none; border: none; color: var(--text);
  font-size: 14px; font-family: var(--font-ui); outline: none;
}
.query-input input::placeholder { color: var(--text-muted); }
.query-input button {
  background: var(--blue); color: #fff; border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px; font-size: 13px; font-family: var(--font-ui);
  cursor: pointer; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  transition: background 120ms;
}
.query-input button:hover    { background: #3a7bc8; }
.query-input button:disabled { opacity: 0.45; cursor: not-allowed; }
.query-input svg { opacity: 0.5; }
.query-input > div { display: flex; align-items: center; }

/* ── Execution Trace Timeline — Dribbble node style ── */
.trace-card   { padding: 16px; margin: 16px 0; }
.trace-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; font-size: 12px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

.trace-node { display: flex; align-items: flex-start; gap: 12px; padding: 5px 0; position: relative; }
.trace-node::before {
  content: ''; position: absolute; left: 10px; top: 26px; bottom: -5px;
  width: 1px;
  background: repeating-linear-gradient(to bottom, var(--glass-border) 0, var(--glass-border) 4px, transparent 4px, transparent 8px);
}
.trace-node:last-child::before { display: none; }

/* flat circle with colored border — matches Dribbble node style */
.trace-dot {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 10px;
  background: var(--canvas-elevated);
  border: 2px solid var(--glass-border);
}
.trace-dot.completed { border-color: var(--green);  color: var(--green);  background: var(--green-soft); }
.trace-dot.running   { border-color: var(--blue);   color: var(--blue);   background: var(--blue-soft);  animation: pulse 1.2s ease-in-out infinite; }
.trace-dot.failed    { border-color: var(--red);    color: var(--red);    background: var(--red-soft); }
.trace-dot.pending   { border-color: var(--glass-border); color: var(--text-muted); }

.trace-info    { flex: 1; min-width: 0; }
.trace-name    { font-size: 13px; font-weight: 500; color: var(--text); }
.trace-summary { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.trace-timing  { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

/* ── Result Block ── */
.result-block  { margin: 16px 0; }
.result-nl     { font-size: 14px; line-height: 1.65; margin-bottom: 16px; color: var(--text); }
.result-nl strong { color: var(--blue-text); }
.result-tabs   { display: flex; gap: 0; border-bottom: 2px solid var(--glass-border); margin-bottom: 12px; }
.result-tab    { padding: 8px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 150ms; }
.result-tab:hover  { color: var(--text); }
.result-tab.active { color: var(--blue-text); border-bottom-color: var(--blue); font-weight: 500; }

.result-sql     { background: var(--canvas); border: 1.5px solid var(--glass-border); border-radius: var(--radius-md); padding: 16px; overflow-x: auto; }
.result-sql pre { font-family: var(--font-mono); font-size: 12px; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap; }

.result-table    { width: 100%; border-collapse: collapse; font-size: 13px; }
.result-table th { text-align: left; padding: 9px 12px; border-bottom: 2px solid var(--glass-border); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; background: var(--canvas); }
.result-table td { padding: 8px 12px; border-bottom: 1px solid #ebebeb; font-family: var(--font-mono); font-size: 12px; color: var(--text); }
.result-table tr:hover td { background: var(--blue-soft); }

.result-actions { display: flex; gap: 8px; margin-top: 12px; }
.result-action  {
  padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px;
  background: var(--canvas-elevated); border: 1.5px solid var(--glass-border);
  color: var(--text-secondary); cursor: pointer; font-family: var(--font-ui);
  transition: all 120ms;
}
.result-action:hover { border-color: var(--blue); color: var(--blue-text); background: var(--blue-soft); }
.follow-ups { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

/* ── Tasks View ── */
.tasks-table    { width: 100%; border-collapse: collapse; }
.tasks-table th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border-bottom: 2px solid var(--glass-border); background: var(--canvas); }
.tasks-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #ebebeb; color: var(--text); }
.tasks-table tr:hover td { background: var(--blue-soft); cursor: pointer; }
.task-query { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Data View ── */
.data-sources   { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.source-card    { padding: 16px; }
.source-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.source-card p  { font-size: 12px; color: var(--text-secondary); }
.schema-tree { margin-top: 16px; }
.schema-table-name { font-size: 13px; font-weight: 500; padding: 6px 0; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text); }
.schema-table-name:hover { color: var(--blue-text); }
.schema-columns  { padding-left: 20px; }
.schema-col      { font-size: 12px; color: var(--text-secondary); padding: 2px 0; font-family: var(--font-mono); display: flex; gap: 8px; }
.schema-col-type  { color: var(--text-muted); }
.schema-col-badge { font-size: 10px; color: var(--blue-text); }

/* ── Settings ── */
.settings-section    { margin-bottom: 24px; }
.settings-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
.settings-row        { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.settings-label      { font-size: 13px; color: var(--text-secondary); min-width: 120px; }
.settings-input {
  padding: 8px 12px; border-radius: var(--radius-md);
  border: 1.5px solid var(--glass-border);
  background: var(--canvas-elevated); color: var(--text);
  font-size: 13px; font-family: var(--font-ui);
  outline: none; flex: 1; max-width: 400px; transition: border-color 150ms;
}
.settings-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }

/* ── Toast ── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 16px; border-radius: var(--radius-md); font-size: 13px;
  background: var(--canvas-elevated);
  border: 1.5px solid var(--glass-border);
  box-shadow: 0 4px 12px rgba(0,0,0,.12);
  animation: fadeUp 200ms ease-out;
  display: flex; align-items: center; gap: 8px; color: var(--text);
}
.toast-success { border-left: 3px solid var(--green); }
.toast-error   { border-left: 3px solid var(--red); }

/* ── Animations ── */
@keyframes fadeUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse  { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
@keyframes spin   { to { transform: rotate(360deg); } }
.fade-in { animation: fadeIn 200ms ease; }

/* ── Cmd+K Search Modal ── */
.cmdk-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 15vh;
  animation: fadeIn 120ms ease;
}
.cmdk-modal {
  width: 540px; max-width: calc(100vw - 32px);
  background: var(--glass); border: 2px solid var(--glass-border);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.25), 0 0 0 1px var(--glass-border);
  animation: fadeUp 150ms ease;
}
.cmdk-input-row {
  display: flex; align-items: center; padding: 14px 16px;
  border-bottom: 1px solid var(--glass-border);
}
.cmdk-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 14px; color: var(--text); font-family: var(--font-ui);
}
.cmdk-input::placeholder { color: var(--text-muted); }
.cmdk-esc {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: var(--canvas-deep); border: 1px solid var(--glass-border);
  color: var(--text-muted); cursor: pointer; font-family: var(--font-mono);
}
.cmdk-list { padding: 6px; }
.cmdk-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  transition: background 80ms;
}
.cmdk-item:hover, .cmdk-item-sel { background: var(--glass-hover); }
.cmdk-empty {
  padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar       { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }

/* ── Mobile & Tablet Responsiveness ── */

<body>
<div id="root"></div>
<script>
'use strict';
const e = React.createElement;
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   API LAYER
   ═══════════════════════════════════════════════════════════════════════════ */
const API = window.location.origin;

// Basic markdown → HTML (bold, italic, code, newlines)
function md(text) {
  if (!text) return '';
  // Process line by line so numbered lists get styled
  const lines = text.split('\n');
  const out = [];
  for (const line of lines) {
    let l = line
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code style="background:var(--glass);padding:1px 4px;border-radius:3px;font-family:var(--font-mono);font-size:12px">$1</code>');
    // Numbered list items — indent + muted number
    const numMatch = l.match(/^(\d+)\.\s+(.+)/);
    if (numMatch) {
      l = `<div style="display:flex;gap:8px;margin:3px 0;padding-left:4px"><span style="color:var(--text-muted);font-variant-numeric:tabular-nums;min-width:16px;text-align:right;font-size:12px">${numMatch[1]}.</span><span>${numMatch[2]}</span></div>`;
    } else if (l === '') {
      l = '<div style="height:8px"></div>';
    } else {
      l = '<div>' + l + '</div>';
    }
    out.push(l);
  }
  return out.join('');
}
const api = {
  _tokensen: localStorage.getItem('ora_tokensen') || '',
  _headers() { const h = {'Content-Type':'application/json'}; if(this._tokensen) h['Authorization']='Bearer '+this._tokensen; return h; },
  async get(path) { const r = await fetch(API+path, {headers:this._headers()}); return r.json(); },
  async post(path, body) { const r = await fetch(API+path, {method:'POST',headers:this._headers(),body:JSON.stringify(body)}); return r.json(); },
  async del(path) { const r = await fetch(API+path, {method:'DELETE',headers:this._headers()}); return r.json(); },
  setToken(t) { this._tokensen=t; localStorage.setItem('ora_tokensen',t); },
};

/* ═══════════════════════════════════════════════════════════════════════════
   CMD+K SEARCH MODAL
   Search tables, columns, nav items, and sessions from anywhere in the app.
   ═══════════════════════════════════════════════════════════════════════════ */
function CmdKSearch({workspace, schema, onNavigate, onQuery, onClose}) {
  const [q, setQ] = useState('');
  const [sel, setSel] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => {
    inputRef.current && inputRef.current.focus();
    function handleKey(ev) {
      if (ev.key === 'Escape') onClose();
      if (ev.key === 'ArrowDown') { ev.preventDefault(); setSel(s => Math.min(s+1, results.length-1)); }
      if (ev.key === 'ArrowUp')   { ev.preventDefault(); setSel(s => Math.max(s-1, 0)); }
      if (ev.key === 'Enter')     { ev.preventDefault(); if (results[sel]) pickResult(results[sel]); }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [sel]);

  const NAV_ITEMS = [
    {type:'nav', label:'Home',     icon:'△', view:'home'},
    {type:'nav', label:'Ask',      icon:'◎', view:'ask'},
    {type:'nav', label:'Data',     icon:'⬡', view:'data'},
    {type:'nav', label:'Tasks',    icon:'☰', view:'tasks'},
    {type:'nav', label:'Learn',    icon:'↑', view:'learn'},
    {type:'nav', label:'Settings', icon:'⚙', view:'settings'},
  ];

  // Build result list from nav + schema tables + columns
  const tables = schema?.sources?.flatMap(s => (s.tables||[]).map(t => ({
    type:'table', label:t.name, sub:s.source_id, icon:'▦',
    action:()=>{ onNavigate && onNavigate('data'); onClose(); },
  }))) || [];
  const cols = q.length >= 2 ? (schema?.sources?.flatMap(s =>
    (s.tables||[]).flatMap(t =>
      (t.columns||[]).filter(c => c.name.toLowerCase().includes(q.toLowerCase())).map(c => ({
        type:'column', label:c.name, sub:`${t.name} · ${c.data_type||''}`, icon:'≡',
        action:()=>{ onNavigate && onNavigate('data'); onClose(); },
      }))
    )
  ) || []) : [];

  const navResults = NAV_ITEMS.filter(n => !q || n.label.toLowerCase().includes(q.toLowerCase()));
  const tableResults = tables.filter(t => !q || t.label.toLowerCase().includes(q.toLowerCase())).slice(0,5);
  const results = [...navResults, ...tableResults, ...cols.slice(0,5)];

  function pickResult(r) {
    if (r.type === 'nav') { onNavigate && onNavigate(r.view); onClose(); }
    else if (r.action) r.action();
    // If user types a query and presses enter with no match, run as query
    else if (q.trim() && onQuery) { onQuery(q.trim()); onNavigate && onNavigate('ask'); onClose(); }
  }

  // If user presses enter with no results, run as a query
  function handleSubmit(ev) {
    if (ev.key === 'Enter' && results.length === 0 && q.trim()) {
      onQuery && onQuery(q.trim());
      onNavigate && onNavigate('ask');
      onClose();
    }
  }

  const COLORS = {nav:'var(--blue)', table:'var(--green)', column:'var(--text-secondary)'};

  return e('div', {
    className:'cmdk-overlay',
    onClick: e => { if (e.target === e.currentTarget) onClose(); },
  },
    e('div', {className:'cmdk-modal'},
      e('div', {className:'cmdk-input-row'},
        e('span', {style:{fontSize:14, color:'var(--text-muted)', marginRight:8}}, '⌘'),
        e('input', {
          ref:inputRef, value:q, onChange:ev=>{ setQ(ev.target.value); setSel(0); },
          onKeyDown:handleSubmit,
          placeholder:'Search tables, columns, nav, or ask a question…',
          className:'cmdk-input',
        }),
        e('kbd', {className:'cmdk-esc', onClick:onClose}, 'esc'),
      ),
      results.length > 0
        ? e('div', {className:'cmdk-list'},
            results.map((r, i) =>
              e('div', {
                key:i,
                className:'cmdk-item' + (i===sel ? ' cmdk-item-sel' : ''),
                onMouseEnter:()=>setSel(i),
                onClick:()=>pickResult(r),
              },
                e('span', {style:{color:COLORS[r.type]||'var(--text-muted)', fontSize:13, width:18}}, r.icon||'◎'),
                e('span', {style:{flex:1, fontSize:13, color:'var(--text)'}}, r.label),
                r.sub && e('span', {style:{fontSize:11, color:'var(--text-muted)'}}, r.sub),
                e('span', {style:{
                  fontSize:10, padding:'1px 6px', borderRadius:3,
                  background:'var(--canvas-deep)', color:'var(--text-muted)',
                  border:'1px solid var(--glass-border)',
                }}, r.type),
              )
            )
          )
        : q.trim()
          ? e('div', {className:'cmdk-empty'},
              e('div', {style:{marginBottom:4, fontSize:13, color:'var(--text)'}}, `Ask: "${q}"`),
              e('div', {style:{fontSize:11, color:'var(--text-muted)'}}, 'Press Enter to run as a query'),
            )
          : e('div', {className:'cmdk-empty'}, 'Type to search…'),
    )
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   TOAST SYSTEM
   ═══════════════════════════════════════════════════════════════════════════ */
let _toastId = 0;
function ToastContainer({toasts, onRemove}) {
  return e('div', {className:'toast-container'},
    toasts.map(t => e('div', {key:t.id, className:'toast toast-'+t.type}, t.message))
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ONBOARDING FLOW — multi-step first-time setup + auth for returning users
   Steps: email → code → name* → model* → api-key* (* = first-time only)
   ═══════════════════════════════════════════════════════════════════════════ */

const MODEL_OPTIONS = [
  {
    id: 'claude-sonnet-4-5',
    name: 'Claude Sonnet 4.5',
    provider: 'Anthropic',
    desc: 'Best balance of speed and accuracy. Excellent at complex SQL and reasoning.',
    badge: 'Recommended',
    badgeColor: 'var(--blue-soft)',
    badgeText: 'var(--blue-text)',
    keyField: 'anthropic_key',
    keyPlaceholder: 'sk-ant-api03-...',
    keyLabel: 'Anthropic API Key',
  },
  {
    id: 'gpt-4o',
    name: 'GPT-4o',
    provider: 'OpenAI',
    desc: 'Fast and capable. Great for straightforward queries and high throughput.',
    badge: 'Popular',
    badgeColor: 'var(--green-soft)',
    badgeText: 'var(--green-text)',
    keyField: 'openai_key',
    keyPlaceholder: 'sk-...',
    keyLabel: 'OpenAI API Key',
  },
  {
    id: 'gpt-4o-mini',
    name: 'GPT-4o mini',
    provider: 'OpenAI',
    desc: 'Cheapest option. Good for simple queries with tight cost budgets.',
    badge: 'Budget',
    badgeColor: 'var(--amber-soft)',
    badgeText: 'var(--amber-text)',
    keyField: 'openai_key',
    keyPlaceholder: 'sk-...',
    keyLabel: 'OpenAI API Key',
  },
  {
    id: 'claude-haiku-3-5',
    name: 'Claude Haiku 3.5',
    provider: 'Anthropic',
    desc: 'Ultra-fast Claude model. Ideal for high-volume or latency-sensitive workloads.',
    badge: 'Fast',
    badgeColor: 'var(--glass)',
    badgeText: 'var(--text-secondary)',
    keyField: 'anthropic_key',
    keyPlaceholder: 'sk-ant-api03-...',
    keyLabel: 'Anthropic API Key',
  },
];

function OnboardingFlow({onComplete}) {
  // Detect if user has completed onboarding before
  const isFirstTime = !localStorage.getItem('ora_onboarding_done');

  // Auth state
  const [email, setEmail] = useState('');
  const [code, setCode] = useState('');
  const [user, setUser] = useState(null);

  // Onboarding state
  const [name, setName] = useState('');
  const [selectedModel, setSelectedModel] = useState(MODEL_OPTIONS[0].id);
  const [apiKey, setApiKey] = useState('');
  const [keyStatus, setKeyStatus] = useState(null); // null | 'testing' | 'ok' | 'fail'

  // Step: email | code | name | model | apikey | done
  const [step, setStep] = useState('email');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // For returning users, we still show model/key steps if no key configured
  const hasStoredKey = (() => {
    try {
      const s = JSON.parse(localStorage.getItem('ora_settings') || '{}');
      return !!(s.anthropic_key || s.openai_key);
    } catch(e) { return false; }
  })();

  const modelObj = MODEL_OPTIONS.find(m => m.id === selectedModel) || MODEL_OPTIONS[0];

  // Step progress for dots
  const allSteps = isFirstTime ? ['email','code','name','model','apikey'] : (hasStoredKey ? ['email','code'] : ['email','code','model','apikey']);
  const stepIdx = allSteps.indexOf(step);

  async function sendCode() {
    if (!email.trim()) return;
    setLoading(true); setError('');
    try {
      await api.post('/auth/magic-link', {email: email.trim()});
      setStep('code');
    } catch(err) { setError('Could not send code. Try again.'); }
    setLoading(false);
  }

  async function verifyCode() {
    if (!code.trim()) return;
    setLoading(true); setError('');
    try {
      const r = await api.post('/auth/magic-link/verify', {email: email.trim(), code: code.trim()});
      if (r.tokensen) {
        api.setToken(r.tokensen);
        setUser(r.user);
        // Decide next step
        if (isFirstTime) {
          setName(r.user?.display_name || '');
          setStep('name');
        } else if (!hasStoredKey) {
          setStep('model');
        } else {
          // Returning user with key configured — go straight to app
          _finishOnboarding(r.user, null, null);
        }
      } else {
        setError('Invalid code. Check your email and try again.');
      }
    } catch(err) { setError('Verification failed. Try again.'); }
    setLoading(false);
  }

  function advanceName() {
    if (!name.trim()) return;
    localStorage.setItem('ora_username', name.trim());
    setStep('model');
  }

  function advanceModel() {
    setStep('apikey');
    setApiKey(''); setKeyStatus(null);
  }

  async function testKey() {
    if (!apiKey.trim()) return;
    setKeyStatus('testing');
    try {
      const r = await api.post('/api/test-key', {
        key: apiKey.trim(),
        provider: modelObj.keyField === 'anthropic_key' ? 'anthropic' : 'openai',
      });
      setKeyStatus(r.valid ? 'ok' : 'fail');
    } catch(e) { setKeyStatus('fail'); }
  }

  async function finishWithKey() {
    if (keyStatus !== 'ok' && keyStatus !== null) return;
    setLoading(true);
    // Save settings
    const settings = {
      model: selectedModel,
      [modelObj.keyField]: apiKey.trim() || undefined,
    };
    // Also persist to localStorage for sidebar display
    localStorage.setItem('ora_settings', JSON.stringify(settings));
    try { await api.post('/api/settings', settings); } catch(e) {}
    _finishOnboarding(user, selectedModel, apiKey.trim());
    setLoading(false);
  }

  function skipKey() {
    // Allow skipping API key — user can configure later in Settings
    _finishOnboarding(user, selectedModel, null);
  }

  function _finishOnboarding(u, model, key) {
    localStorage.setItem('ora_onboarding_done', '1');
    const finalUser = u || user;
    if (name.trim()) finalUser.display_name = name.trim();
    else if (finalUser && !finalUser.display_name) finalUser.display_name = localStorage.getItem('ora_username') || '';
    onComplete(finalUser);
  }

  // ── Render ──────────────────────────────────────────────────────────────
  function Logo() {
    return e('div', {className:'sidebar-logo', style:{justifyContent:'center',marginBottom:12}},
      e('div', {className:'sidebar-logo-icon'}),
      e('span', {className:'sidebar-logo-text'}, 'Ora'),
    );
  }

  function Steps() {
    if (allSteps.length <= 1) return null;
    return e('div', {className:'ob-steps'},
      allSteps.map((s,i) =>
        e('div', {key:s, className:'ob-dot'+(i===stepIdx?' active':i<stepIdx?' done':'')})
      )
    );
  }

  function Err() {
    return error ? e('p', {style:{fontSize:13,color:'var(--red-text)',marginBottom:12,textAlign:'center'}}, error) : null;
  }

  // Step: email
  if (step === 'email') return e('div', {className:'auth-screen'},
    e('div', {className:'card auth-card'},
      Logo(),
      e(Steps),
      e('h1', {className:'auth-title'}, 'Welcome to Ora'),
      e('p', {className:'auth-subtitle'}, 'Speak to your database.'),
      Err(),
      e('input', {className:'auth-input', type:'email', placeholder:'Email address', value:email,
        autoFocus:true, onChange:ev=>setEmail(ev.target.value), onKeyDown:ev=>{if(ev.key==='Enter')sendCode()}}),
      e('button', {className:'auth-btn auth-btn-primary', onClick:sendCode, disabled:loading||!email.trim()},
        loading ? 'Sending...' : 'Continue with email'),
      e('div', {style:{textAlign:'center',marginTop:8}},
        e('button', {
          style:{background:'none',border:'none',color:'var(--text-muted)',fontSize:12,cursor:'pointer',textDecoration:'underline',padding:'4px 0'},
          onClick: () => {
            // Skip auth entirely — use local session (open source / local mode)
            localStorage.setItem('ora_username', 'You');
            onComplete({user_id:'local', display_name:'You', email:'local@localhost'});
          }
        }, 'Running locally? Continue without account →')
      ),
    )
  );

  // Step: code
  if (step === 'code') return e('div', {className:'auth-screen'},
    e('div', {className:'card auth-card'},
      Logo(),
      e(Steps),
      e('h1', {className:'auth-title'}, 'Check your email'),
      e('p', {className:'auth-subtitle'}, 'We sent a 6-digit code to ' + email),
      Err(),
      e('input', {className:'auth-input', type:'text', placeholder:'6-digit code', value:code,
        autoFocus:true, onChange:ev=>setCode(ev.target.value.replace(/\D/g,'')), onKeyDown:ev=>{if(ev.key==='Enter')verifyCode()}}),
      e('button', {className:'auth-btn auth-btn-primary', onClick:verifyCode, disabled:loading||code.length<4},
        loading ? 'Verifying...' : 'Sign in'),
      e('button', {className:'auth-btn', onClick:()=>{setStep('email');setCode('');setError('');}}, '← Back'),
    )
  );

  // Step: name (first-time only)
  if (step === 'name') return e('div', {className:'auth-screen'},
    e('div', {className:'card auth-card'},
      Logo(),
      e(Steps),
      e('h1', {className:'auth-title'}, 'What should we call you?'),
      e('p', {className:'auth-subtitle'}, 'Just your first name is fine'),
      e('input', {className:'auth-input', placeholder:'Your name', autoFocus:true, value:name,
        onChange:ev=>setName(ev.target.value), onKeyDown:ev=>{if(ev.key==='Enter')advanceName()}}),
      e('button', {className:'auth-btn auth-btn-primary', onClick:advanceName, disabled:!name.trim()}, 'Continue →'),
    )
  );

  // Step: model selection
  if (step === 'model') return e('div', {className:'auth-screen'},
    e('div', {className:'card auth-card'},
      Logo(),
      e(Steps),
      e('h1', {className:'auth-title'}, 'Choose your AI model'),
      e('p', {className:'auth-subtitle'}, 'You can change this any time in Settings'),
      e('div', {className:'model-cards'},
        MODEL_OPTIONS.map(m =>
          e('div', {key:m.id, className:'model-card'+(selectedModel===m.id?' selected':''), onClick:()=>setSelectedModel(m.id)},
            e('div', {className:'model-card-name'}, m.name),
            e('div', {style:{fontSize:10,color:'var(--text-muted)',marginBottom:4}}, m.provider),
            e('div', {className:'model-card-desc'}, m.desc),
            e('span', {className:'model-card-badge', style:{background:m.badgeColor,color:m.badgeText}}, m.badge),
          )
        )
      ),
      e('button', {className:'auth-btn auth-btn-primary', onClick:advanceModel}, 'Continue →'),
    )
  );

  // Step: API key
  if (step === 'apikey') return e('div', {className:'auth-screen'},
    e('div', {className:'card auth-card'},
      Logo(),
      e(Steps),
      e('h1', {className:'auth-title'}, modelObj.keyLabel),
      e('p', {className:'auth-subtitle'}, 'Your key stays on your machine. We never store it on our servers.'),
      e('div', {className:'key-input-row'},
        e('input', {className:'auth-input', type:'password', placeholder:modelObj.keyPlaceholder, value:apiKey,
          autoFocus:true, onChange:ev=>{setApiKey(ev.target.value);setKeyStatus(null);},
          onKeyDown:ev=>{if(ev.key==='Enter'&&apiKey.trim())testKey();},
          style:{fontFamily:'var(--font-mono)',fontSize:12}
        }),
        e('button', {className:'auth-btn', style:{width:'auto',padding:'0 16px',marginBottom:0,whiteSpace:'nowrap',flexShrink:0},
          onClick:testKey, disabled:!apiKey.trim()||keyStatus==='testing'},
          keyStatus==='testing' ? '...' : keyStatus==='ok' ? '✓' : keyStatus==='fail' ? '✕ Retry' : 'Test'),
      ),
      keyStatus==='ok' && e('p', {style:{fontSize:12,color:'var(--green-text)',marginBottom:12,textAlign:'left'}}, '✓ Key verified — ready to query'),
      keyStatus==='fail' && e('p', {style:{fontSize:12,color:'var(--red-text)',marginBottom:12,textAlign:'left'}}, '✕ Key invalid or expired. Check and retry.'),
      e('button', {className:'auth-btn auth-btn-primary', onClick:finishWithKey, disabled:loading||!apiKey.trim()||keyStatus==='fail'||keyStatus==='testing'},
        loading ? 'Saving...' : 'Start Querying →'),
      e('button', {className:'auth-btn', style:{opacity:0.6}, onClick:skipKey}, 'Skip for now — configure later in Settings'),
    )
  );

  return null;
}

// Legacy AuthScreen alias (kept for compatibility)
function AuthScreen({onLogin}) {
  return e(OnboardingFlow, {onComplete: onLogin});
}

/* ═══════════════════════════════════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════════════════════════════════ */

function Icon({name, size=16}) {

    home: 'M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z',
    chat: 'M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z',

/* ═══════════════════════════════════════════════════════════════════════════
   TRACE TIMELINE (the signature Beam.ai component)
   ═══════════════════════════════════════════════════════════════════════════ */
function TraceTimeline({trace, collapsed}) {
  const [expanded, setExpanded] = useState(!collapsed);
  const [expandedNode, setExpandedNode] = useState(null);
  if (!trace || !trace.root) return null;
  const nodes = trace.root.children || [];
  const statusIcon = {completed:'✓', failed:'✕', running:'◐', pending:'○'};
  const statusLabel = {completed:'Done', failed:'Failed', running:'Running', pending:'Queued'};

  // Calculate totals
  const totalTokens = trace.total_tokens || nodes.reduce((s,n)=>s+(n.tokens||0),0);
  const tokensIn = trace.tokens_input || 0;
  const tokensOut = trace.tokens_output || 0;
  const totalCost = trace.total_cost_usd || 0;
  const totalMs = trace.total_latency_ms || nodes.reduce((s,n)=>s+(n.latency_ms||0),0);
  const modelId = trace.model_id || '';
  const modelLabel = (() => {
    if (!modelId) return '';
    if (modelId.includes('opus')) return 'Opus';
    if (modelId.includes('sonnet')) return 'Sonnet';
    if (modelId.includes('haiku')) return 'Haiku';
    if (modelId.includes('gpt-4o-mini')) return 'GPT-4o mini';
    if (modelId.includes('gpt-4o')) return 'GPT-4o';
    if (modelId.includes('o1-mini')) return 'o1-mini';
    if (modelId.includes('llama')) return 'Llama';
    if (modelId.includes('mistral')) return 'Mistral';
    return modelId.split('/').pop().split('-').slice(0,2).join('-');
  })();
  const providerColor = modelId.startsWith('claude') ? '#c084fc' : modelId.startsWith('gpt') || modelId.startsWith('o1') ? '#22c55e' : '#f59e0b';

  // Correction count — count nodes that represent correction attempts
  const correctionCount = trace.correction_count || nodes.filter(n =>
    (n.name||'').toLowerCase().includes('correct') ||
    (n.name||'').toLowerCase().includes('retry') ||
    (n.name||'').toLowerCase().includes('fix')
  ).length;

  // Strategy badge
  const traceStrategy = trace.strategy || '';
  const strategyMeta = {
    fast:     { label:'⚡ Fast',     color:'var(--green-text)',  bg:'rgba(45,157,106,.08)',  border:'rgba(45,157,106,.2)'  },
    balanced: { label:'⚖ Balanced', color:'var(--blue-text)',   bg:'var(--blue-soft)',      border:'rgba(74,144,217,.2)'  },
    accurate: { label:'🎯 Accurate', color:'var(--red-text)',    bg:'rgba(224,85,119,.08)',  border:'rgba(224,85,119,.2)'  },
  }[traceStrategy] || null;

  return e('div', {className:'card trace-card card-static'},
    // Header
    e('div', {className:'trace-header', onClick:()=>setExpanded(!expanded), style:{cursor:'pointer'}},
      e('div', {style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        e('span', null, expanded?'▾':'▸'),
        e('span', {style:{fontWeight:500}}, nodes.length+' agent steps'),
        e('span', {style:{fontFamily:'var(--font-mono)',fontSize:11}}, totalMs+'ms'),
        tokensIn > 0 || tokensOut > 0
          ? e('span', {style:{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-secondary)'}},
              e('span', {style:{color:'#4f7df9',opacity:0.9}}, '↑'+tokensIn.toLocaleString()),
              ' ',
              e('span', {style:{color:'#22c55e',opacity:0.9}}, '↓'+tokensOut.toLocaleString()),
              e('span', {style:{color:'var(--text-muted)'}}, ' tok'),
            )
          : totalTokens > 0 && e('span', {style:{fontFamily:'var(--font-mono)',fontSize:11}}, totalTokens.toLocaleString()+' tokens'),
        modelLabel && e('span', {style:{display:'inline-flex',alignItems:'center',gap:4,fontSize:10,padding:'1px 7px',borderRadius:10,background:'rgba(0,0,0,0.06)',border:'1px solid rgba(0,0,0,0.08)'}},
          e('span', {style:{width:5,height:5,borderRadius:'50%',background:providerColor}}),
          e('span', {style:{color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}, modelLabel),
        ),
        strategyMeta && e('span', {style:{fontSize:10,fontWeight:500,padding:'1px 7px',borderRadius:10,background:strategyMeta.bg,border:`1px solid ${strategyMeta.border}`,color:strategyMeta.color}},
          strategyMeta.label
        ),
        correctionCount > 0 && e('span', {title:`${correctionCount} self-correction${correctionCount>1?'s':''} applied`, style:{fontSize:10,padding:'1px 7px',borderRadius:10,background:'rgba(212,148,10,.08)',border:'1px solid rgba(212,148,10,.2)',color:'var(--amber-text)',cursor:'default'}},
          `↺ ${correctionCount} correction${correctionCount>1?'s':''}`
        ),
      ),
      e('span', {className:'badge badge-'+(trace.succeeded?'success':'error')}, trace.succeeded?'Completed':'Failed'),
    ),

    // Expanded trace nodes
    expanded && nodes.map((node, i) => {
      const isExpanded = expandedNode === i;
      const hasFailed = node.status === 'failed';
      const tokens = node.tokens || node.detail?.tokens || 0;
      const agentLabel = node.agent ? node.agent.replace('_',' ') : '';

      return e('div', {key:i, className:'trace-node', style:{animation:'fadeUp 200ms ease '+(i*50)+'ms both'}},
        // Status dot
        e('div', {className:'trace-dot '+(node.status||'completed')}, statusIcon[node.status]||'✓'),

        // Main content
        e('div', {className:'trace-info', style:{flex:1,minWidth:0}},
          // Name + agent badge
          e('div', {style:{display:'flex',alignItems:'center',gap:6}},
            e('span', {className:'trace-name'}, node.name),
            agentLabel && e('span', {style:{fontSize:10,color:'var(--text-muted)',background:'var(--glass)',padding:'1px 6px',borderRadius:4}}, agentLabel),
          ),

          // Summary
          e('div', {className:'trace-summary'}, node.summary||''),

          // Agent thinking/reasoning (if available)
          (node.detail?.thinking || node.thinking) && e('div', {style:{fontSize:12,color:'var(--text-secondary)',marginTop:4,fontStyle:'italic',lineHeight:1.5,maxHeight:60,overflow:'hidden'}},
            '"' + (node.detail?.thinking || node.thinking) + '"',
          ),

          // Failed = show error prominently
          hasFailed && e('div', {style:{fontSize:12,color:'var(--red-text)',marginTop:4}}, node.detail?.summary || 'Step failed'),

          // Expandable detail
          isExpanded && node.detail && e('div', {style:{marginTop:8,padding:8,background:'var(--canvas-elevated)',borderRadius:6,fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-secondary)',whiteSpace:'pre-wrap',maxHeight:200,overflowY:'auto'}},
            JSON.stringify(node.detail, null, 2),
          ),

          // Sub-steps (for fan_out/decompose)
          node.children && node.children.length > 0 && e('div', {style:{marginTop:6,paddingLeft:12,borderLeft:'1px solid var(--glass-border)'}},
            node.children.map((child, ci) =>
              e('div', {key:ci, style:{display:'flex',alignItems:'center',gap:6,padding:'2px 0',fontSize:12}},
                e('span', {style:{color:child.status==='completed'?'var(--green-text)':'var(--red-text)'}}, statusIcon[child.status]||'?'),
                e('span', {style:{color:'var(--text-secondary)'}}, child.name || child.summary || 'sub-step'),
              )
            ),
          ),
        ),

        // Right side: timing + tokens + expand toggle
        e('div', {style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}},
          e('div', {className:'trace-timing'}, (node.latency_ms||0)+'ms'),
          tokens > 0 && e('div', {style:{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}, tokens+' tokens'),
          e('div', {
            style:{fontSize:10,color:'var(--blue-text)',cursor:'pointer',marginTop:2},
            onClick:ev=>{ev.stopPropagation();setExpandedNode(isExpanded?null:i)},
          }, isExpanded?'hide':'detail'),
        ),
      );
    }),

    // Synthetic Learn Agent node — appears after every successful query
    expanded && trace.succeeded && e('div', {
      className:'trace-node',
      style:{animation:'fadeUp 200ms ease '+(nodes.length*50+80)+'ms both', opacity:0.85},
    },
      e('div', {className:'trace-dot completed', style:{background:'rgba(192,132,252,0.2)',color:'#c084fc',border:'1px solid rgba(192,132,252,0.3)',fontSize:11}}, '✦'),
      e('div', {className:'trace-info', style:{flex:1}},
        e('div', {style:{display:'flex',alignItems:'center',gap:6}},
          e('span', {className:'trace-name', style:{color:'#c084fc'}}, 'Learn Agent'),
          e('span', {style:{fontSize:10,color:'var(--text-muted)',background:'var(--glass)',padding:'1px 6px',borderRadius:4}}, 'background'),
        ),
        e('div', {className:'trace-summary'},
          trace.learn_event?.soul_evolved
            ? 'SOUL evolved — mental model updated from latest query patterns'
            : 'Auto-saved as training pair · SOUL observation recorded',
        ),
      ),
      e('div', {style:{fontSize:10,color:'#c084fc',fontFamily:'var(--font-mono)',flexShrink:0}}, 'async'),
    ),
  );
}

// Extract the user's actual question from nl_query, stripping multi-turn context prefix
function extractQuestion(nlQuery) {
  if (!nlQuery) return '';
  if (nlQuery.includes('Current question:'))
    return nlQuery.split('Current question:').pop().trim();
  // Fall back to last non-empty line
  const lines = nlQuery.split('\n').map(l => l.trim()).filter(Boolean);
  return lines[lines.length - 1] || nlQuery;
}

function HomeView({workspace, onNavigate}) {
  const [stats, setStats] = useState({queries:0, succeeded:0, totalCost:0, avgLatency:0});
  const [tasks, setTasks] = useState([]);
  const [soul, setSoul] = useState(null);
  const [modelStats, setModelStats] = useState([]);
  const [currentModel, setCurrentModel] = useState(null);

  useEffect(() => {
    const wsId = workspace?.workspace_id || '';
    // Fetch task history for stats
    api.get('/workspaces/' + wsId + '/tasks?limit=100').then(d => {
      const t = d.tasks || [];
      setTasks(t.slice(0, 5));
      const total = t.length;
      const succeeded = t.filter(x => x.succeeded).length;
      const totalCost = t.reduce((s, x) => s + (x.total_cost_usd || 0), 0);
      const totalTokens = t.reduce((s, x) => s + (x.total_tokens || 0), 0);
      const avgLatency = total > 0 ? Math.round(t.reduce((s, x) => s + (x.total_latency_ms || 0), 0) / total) : 0;
      setStats({
        queries: total,
        succeeded,
        accuracy: total > 0 ? Math.round(succeeded / total * 100) : 0,
        totalCost,
        totalTokens,
        avgLatency,
      });
    }).catch(() => {});
    // Fetch SOUL profile
    api.get('/soul/local').then(setSoul).catch(()=>{});
    // Fetch per-model observability stats
    api.get('/api/model-stats').then(d => setModelStats(d.models || [])).catch(()=>{});
    // Fetch current active model
    api.get('/api/current-model').then(setCurrentModel).catch(()=>{});
  }, [workspace]);

  return e('div', null,
    e('div', {className:'home-header'},
      e('h1', null, workspace?.name || 'Workspace'),
      e('p', null, (workspace?.sources?.length||0)+' sources connected'),
    ),
    e('div', {className:'kpi-grid'},
      [
        {v: stats.queries || '—', l:'Queries'},
        {v: stats.queries > 0 ? stats.accuracy+'%' : '—', l:'Accuracy'},
        {v: stats.totalTokens > 0 ? stats.totalTokens.toLocaleString() : '—', l:'Tokens Used'},
        {v: stats.avgLatency > 0 ? (stats.avgLatency/1000).toFixed(1)+'s' : '—', l:'Avg Latency'},
      ].map((k,i) =>
        e('div', {key:i, className:'card kpi-card card-static'},
          e('div', {className:'kpi-value'}, k.v),
          e('div', {className:'kpi-label'}, k.l),
        )
      )
    ),
    e('div', {className:'card card-static', style:{padding:'14px 16px',marginBottom:16}},
      e(PipelineFlowCanvas, { workspace, onNavigate }),
    ),
    // Recent tasks
    tasks.length > 0 && e('div', null,
      e('h3', {style:{fontSize:14,fontWeight:600,marginBottom:8}}, 'Recent Queries'),
      tasks.map((t, i) => {
        return e('div', {key:i, className:'card card-static', style:{padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}, onClick:()=>onNavigate('tasks')},
          e('div', {style:{fontSize:13,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}, extractQuestion(t.nl_query)),
          e('div', {style:{display:'flex',gap:8,alignItems:'center',flexShrink:0}},
            e('span', {className:'badge badge-'+(t.succeeded?'success':'error')}, t.succeeded?'done':'failed'),
            e('span', {style:{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}, Math.round((t.total_latency_ms||0)/1000)+'s'),
          ),
        );
      }),
    ),

    // Model Observability Panel
    (currentModel || modelStats.length > 0) && e('div', {style:{marginTop:16}},
      e('h3', {style:{fontSize:14,fontWeight:600,marginBottom:8}}, 'Model Observability'),
      e('div', {className:'card card-static', style:{padding:16}},
        // Current active model
        currentModel && e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom: modelStats.length > 0 ? 12 : 0}},
          e('div', null,
            e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:2}}, 'Active model'),
            e('div', {style:{display:'flex',alignItems:'center',gap:6}},
              e('span', {style:{width:7,height:7,borderRadius:'50%',background: (currentModel.model||'').startsWith('claude') ? '#c084fc' : (currentModel.model||'').startsWith('gpt') ? '#22c55e' : '#f59e0b'}}),
              e('span', {style:{fontSize:13,fontWeight:600,fontFamily:'var(--font-mono)',color:'var(--text)'}}, currentModel.model || '—'),
            ),
          ),
          e('span', {style:{fontSize:11,padding:'3px 10px',borderRadius:10,background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.2)',color:'#22c55e'}}, '● live'),
        ),
        // Per-model stats table
        modelStats.length > 0 && e('div', null,
          e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:8,borderTop:'1px solid var(--glass-border)',paddingTop:8}}, 'Usage by model'),
          e('table', {style:{width:'100%',fontSize:12,borderCollapse:'collapse'}},
            e('thead', null, e('tr', null,
              ['Model','Queries','Tokens ↑/↓','Avg Latency','Success'].map(h => e('th', {key:h, style:{textAlign:'left',padding:'4px 6px',fontSize:11,color:'var(--text-muted)',fontWeight:500,borderBottom:'1px solid var(--glass-border)'}}, h))
            )),
            e('tbody', null, modelStats.map((m, i) => {
              const mid = m.model || '';
              const modelColor = mid.startsWith('claude') ? '#c084fc' : mid.startsWith('gpt') || mid.startsWith('o1') ? '#22c55e' : '#f59e0b';
              const shortId = (() => {
                if (mid.includes('sonnet')) return 'Sonnet';
                if (mid.includes('opus')) return 'Opus';
                if (mid.includes('haiku')) return 'Haiku';
                if (mid.includes('gpt-4o-mini')) return 'GPT-4o mini';
                if (mid.includes('gpt-4o')) return 'GPT-4o';
                if (mid.includes('o1-mini')) return 'o1-mini';
                return mid.split('/').pop().split('-').slice(0,2).join('-');
              })();
              // success_rate from API is already 0-100
              const srColor = m.success_rate >= 90 ? '#22c55e' : m.success_rate >= 70 ? '#f59e0b' : '#ef4444';
              return e('tr', {key:i, style:{borderBottom:'1px solid rgba(0,0,0,0.03)'}},
                e('td', {style:{padding:'5px 6px'}},
                  e('div', {style:{display:'flex',alignItems:'center',gap:5}},
                    e('span', {style:{width:6,height:6,borderRadius:'50%',background:modelColor,flexShrink:0}}),
                    e('span', {style:{fontFamily:'var(--font-mono)',color:'var(--text-secondary)'}}, shortId || mid || '?'),
                  ),
                ),
                e('td', {style:{padding:'5px 6px',fontFamily:'var(--font-mono)',color:'var(--text-secondary)'}}, m.queries||0),
                e('td', {style:{padding:'5px 6px',fontFamily:'var(--font-mono)',fontSize:11}},
                  e('span', {style:{color:'rgba(79,125,249,0.85)'}}, '↑'+(m.tokens_input||0).toLocaleString()),
                  ' ',
                  e('span', {style:{color:'rgba(34,197,94,0.85)'}}, '↓'+(m.tokens_output||0).toLocaleString()),
                ),
                e('td', {style:{padding:'5px 6px',fontFamily:'var(--font-mono)',color:'var(--text-secondary)'}}, m.avg_latency_ms ? (m.avg_latency_ms/1000).toFixed(1)+'s' : '—'),
                e('td', {style:{padding:'5px 6px'}},
                  e('span', {style:{color: srColor}},
                    m.success_rate != null ? Math.round(m.success_rate)+'%' : '—'
                  ),
                ),
              );
            })),
          ),
        ),
      ),
    ),

    // SOUL Profile
    soul && soul.query_count > 0 && e('div', {style:{marginTop:16}},
      e('h3', {style:{fontSize:14,fontWeight:600,marginBottom:8}}, 'SOUL — Your Data Profile'),
      e('div', {className:'card card-static', style:{padding:16}},
        e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          soul.accountability_unit && e('div', null,
            e('div', {style:{fontSize:11,color:'var(--text-muted)'}}, 'Thinks in terms of'),
            e('div', {style:{fontSize:13,fontWeight:500}}, soul.accountability_unit),
          ),
          soul.time_reference && e('div', null,
            e('div', {style:{fontSize:11,color:'var(--text-muted)'}}, 'Time framing'),
            e('div', {style:{fontSize:13,fontWeight:500}}, soul.time_reference),
          ),
        ),
        Object.keys(soul.vocabulary_map||{}).length > 0 && e('div', {style:{marginTop:12,borderTop:'1px solid var(--glass-border)',paddingTop:8}},
          e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:6}}, 'Learned vocabulary'),
          Object.entries(soul.vocabulary_map).map(([term,col]) =>
            e('div', {key:term, style:{fontSize:12,fontFamily:'var(--font-mono)'}},
              e('span', {style:{color:'var(--blue-text)'}}, term), ' → ',
              e('span', {style:{color:'var(--text-secondary)'}}, col),
            )
          ),
        ),
        e('div', {style:{fontSize:11,color:'var(--text-muted)',marginTop:8}}, 'SOUL evolves every 20 queries'),
      ),
    ),
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   ASK VIEW (Chat + Execution Traces + Results)
   ═══════════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════════
   RESULT BLOCK — per-message component with its own tab state
   ═══════════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════════
   CHART VIEW — renders Chart.js bar/line/pie from query results
   ═══════════════════════════════════════════════════════════════════════════ */
function ChartView({config, rows, columns}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !rows?.length || !config) return;
    if (chartRef.current) chartRef.current.destroy();

    const xCol = config.x_column || columns[0];
    const yCol = config.y_column || columns[columns.length-1];
    const labels = rows.map(r => String(r[xCol]||''));
    const data = rows.map(r => Number(r[yCol])||0);

    chartRef.current = new Chart(canvasRef.current, {
      type: config.type || 'bar',
      data: {
        labels,
        datasets: [{
          label: yCol,
          data,
          backgroundColor: config.type==='pie'
            ? ['#4f7df9','#22c55e','#f59e0b','#ef4444','#a78bfa','#06b6d4','#f97316','#ec4899']
            : 'rgba(79,125,249,0.6)',
          borderColor: 'rgba(79,125,249,1)',
          borderWidth: 1,
          borderRadius: config.type==='bar' ? 4 : 0,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {legend:{display:config.type==='pie',labels:{color:'#8b92a8'}},},
        scales: config.type==='pie' ? {} : {
          x:{ticks:{color:'#8b92a8',maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'}},
          y:{ticks:{color:'#8b92a8'},grid:{color:'rgba(255,255,255,0.04)'}},
        },
      },
    });

    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [config, rows, columns]);

  return e('div', {style:{height:280,padding:'8px 0'}},
    e('canvas', {ref:canvasRef}),
  );
}

function ResultBlock({data: d, addToast, setQuery, workspace}) {
  const [tab, setTab] = useState('sql');
  const [feedback, setFeedback] = useState(null); // null | 'up' | 'down'
  const [showCorrection, setShowCorrection] = useState(false);
  const [correctionNote, setCorrectionNote] = useState('');
  const [correctedSql, setCorrectedSql] = useState(d.sql || '');
  const [correctionSaved, setCorrectionSaved] = useState(false);
  const [correctionResult, setCorrectionResult] = useState(null);
  const [savingCorrection, setSavingCorrection] = useState(false);
  // Trace-aware: which node did the user identify as the failure point?
  const [failedNode, setFailedNode] = useState('');
  const [failureType, setFailureType] = useState('');
  // Regeneration step: 'identify' | 'regenerating' | 'review'
  const [correctionStep, setCorrectionStep] = useState('identify');
  const [regenSql, setRegenSql] = useState('');
  const [regenWhatChanged, setRegenWhatChanged] = useState('');
  const [regenDomainInsight, setRegenDomainInsight] = useState('');
  const [regenEdited, setRegenEdited] = useState('');
  const [regenRows, setRegenRows] = useState([]);
  const [regenColumns, setRegenColumns] = useState([]);
  const [regenRowCount, setRegenRowCount] = useState(0);
  const [regenExecError, setRegenExecError] = useState('');
  const [regenLesson, setRegenLesson] = useState('');
  const [regenTokensUsed, setRegenTokensUsed] = useState(0);

  // Was this already auto-learned by the Learn Agent?
  const autoLearned = d.learn_event?.action === 'auto_learned';
  const soulEvolved = d.learn_event?.soul_evolved;

  // Extract trace nodes from trace data for the correction panel
  const traceNodes = (d.trace?.root?.children || []).map(n => ({
    node_id: n.node_id,
    name: n.name,
    agent: n.agent,
    node_key: n.detail?.node || '',
  }));
  const traceEvents = (d.trace?.root?.children || []).map(n => n.detail || {});

  function handleThumbsUp() {
    setFeedback('up');
    setShowCorrection(false);
    api.post('/train/sql', {nl_query: d.nl_query || '', sql: d.sql || '', source: 'thumbs_up'});
    addToast(autoLearned ? 'Boosted training quality — already auto-saved ✓' : 'Saved as training example ✓', 'success');
  }

  function handleThumbsDown() {
    setFeedback('down');
    setShowCorrection(true);
    setCorrectedSql(d.sql || '');
    setFailedNode('');
    setFailureType('');
    setCorrectionResult(null);
    setCorrectionStep('identify');
    setRegenSql('');
    setRegenWhatChanged('');
    setRegenEdited('');
  }

  async function runRegenerate() {
    // Step 1 → Step 2: ask the Learn Agent to re-generate SQL with correction context
    setCorrectionStep('regenerating');
    try {
      const wsId = (typeof workspace !== 'undefined' && workspace?.workspace_id) || '';
      const result = await api.post('/learn/regenerate', {
        workspace_id:    wsId,
        nl_query:        d.nl_query || '',
        original_sql:    d.sql || '',
        correction_note: correctionNote.trim(),
        failure_type:    failureType,
        failed_node:     failedNode,
      });
      setRegenSql(result.regenerated_sql || '');
      setRegenEdited(result.regenerated_sql || '');
      setRegenWhatChanged(result.what_changed || '');
      setRegenDomainInsight(result.domain_insight || '');
      setRegenRows(result.rows || []);
      setRegenColumns(result.columns || []);
      setRegenRowCount(result.row_count || 0);
      setRegenExecError(result.exec_error || '');
      setRegenLesson(result.extracted_lesson || '');
      setRegenTokensUsed(result.tokens_used || 0);
      setCorrectionStep('review');
    } catch(e) {
      addToast('Regeneration failed — you can still save the correction manually', 'error');
      setCorrectionStep('identify');
    }
  }

  async function saveCorrection() {
    // Step 2 → Save: commit the reviewed/edited SQL + full chain to LessonStore
    if (savingCorrection) return;
    setSavingCorrection(true);
    const finalSql = (regenEdited || correctedSql || d.sql || '').trim();
    try {
      const result = await api.post('/train/sql', {
        workspace_id:        workspace?.workspace_id || '',
        nl_query:            d.nl_query || '',
        sql:                 finalSql,
        source:              'correction',
        correction_note:     correctionNote.trim(),
        original_sql:        d.sql || '',
        failure_type:        failureType,
        failed_node:         failedNode,
        trace_events:        traceEvents,
        extracted_lesson:    regenLesson,
        domain_insight:      regenDomainInsight || '',
        what_changed:        regenWhatChanged || '',
        rows_preview:        regenRows ? regenRows.slice(0,5) : [],
        columns_preview:     regenColumns || [],
        row_count_preview:   regenRowCount || 0,
        tokens_used:         regenTokensUsed || 0,
      });
      setCorrectionSaved(true);
      setCorrectionResult(result);
      setShowCorrection(false);
      const stageLabel = result.failed_stage
        ? { schema:'schema pruning', retrieval:'example retrieval', planning:'planning',
            generation:'SQL generation', filtering:'filter logic' }[result.failed_stage] || result.failed_stage
        : 'query logic';
      addToast('✦ Learn Agent updated: ' + stageLabel + ' corrected ✓', 'success');
    } catch(e) {
      addToast('Failed to save correction', 'error');
    } finally {
      setSavingCorrection(false);
    }
  }

  // Streaming state — show trace nodes as they arrive
  if (d._streaming) {
    const nodes = d._traceNodes || [];
    return e('div', {style:{marginBottom:24}},
      e('div', {className:'card trace-card card-static', style:{padding:16}},
        e('div', {style:{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}, nodes.length + ' steps completed...'),
        nodes.map((node, i) =>
          e('div', {key:i, className:'trace-node', style:{animation:'fadeUp 200ms ease '+(i*30)+'ms both'}},
            e('div', {className:'trace-dot '+(node.status||'completed')}, node.status==='completed'?'✓':node.status==='failed'?'✕':'◐'),
            e('div', {className:'trace-info'},
              e('div', {className:'trace-name'}, node.name),
              e('div', {className:'trace-summary'}, node.summary||''),
            ),
            e('div', {className:'trace-timing'}, (node.latency_ms||0)+'ms'),
          )
        ),
        e('div', {style:{textAlign:'center',padding:8}},
          e('div', {style:{display:'inline-block',width:16,height:16,border:'2px solid var(--glass-border)',borderTopColor:'var(--blue)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}),
        ),
      ),
    );
  }

  return e('div', {className:'fade-in', style:{marginBottom:24}},
    d.trace && e(TraceTimeline, {trace:d.trace, collapsed:true}),
    d.nl_response && e('div', {className:'result-nl', dangerouslySetInnerHTML:{__html:md(d.nl_response)}}),
    (d.sql || d.rows) && e('div', {className:'result-block'},
      e('div', {className:'result-tabs'},
        ['sql','table', d.chart_config?'chart':null].filter(Boolean).map(t =>
          e('div', {key:t, className:'result-tab'+(tab===t?' active':''), onClick:ev=>{ev.stopPropagation();setTab(t)}},
            t==='sql'?'SQL':t==='table'?'Table'+(d.row_count?' · '+d.row_count:''):'Chart')
        ),
      ),
      tab==='sql' && d.sql && e('div', {className:'result-sql'}, e('pre', null, d.sql)),
      tab==='table' && d.rows && d.rows.length>0 && e('table', {className:'result-table'},
        e('thead', null, e('tr', null, (d.columns||Object.keys(d.rows[0])).map(c => e('th',{key:c},c)))),
        e('tbody', null, d.rows.slice(0,50).map((row,ri) =>
          e('tr', {key:ri}, (d.columns||Object.keys(row)).map(c => e('td',{key:c},String(row[c]??''))))
        )),
      ),
      tab==='chart' && d.chart_config && d.rows && e(ChartView, {config:d.chart_config, rows:d.rows, columns:d.columns||[]}),
      e('div', {className:'result-actions'},
        e('button', {className:'result-action', onClick:()=>{navigator.clipboard.writeText(d.sql||'');addToast('SQL copied','success')}}, 'Copy SQL'),
        e('button', {className:'result-action', onClick:()=>{
          // CSV export
          if(d.rows && d.rows.length) {
            const cols = d.columns || Object.keys(d.rows[0]);
            const csv = [cols.join(','), ...d.rows.map(r=>cols.map(c=>JSON.stringify(r[c]??'')).join(','))].join('\n');
            const blob = new Blob([csv],{type:'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href=url; a.download='ora_results.csv'; a.click();
            URL.revokeObjectURL(url);
            addToast('CSV exported','success');
          }
        }}, 'Export CSV'),
        // Learn Agent auto-learned badge
        autoLearned && feedback !== 'up' && e('span', {
          title: soulEvolved ? 'SOUL also evolved this query' : 'Learn Agent auto-saved this query as a training pair',
          style:{
            fontSize:11,padding:'3px 8px',borderRadius:8,
            background:'rgba(192,132,252,0.1)',border:'1px solid rgba(192,132,252,0.25)',
            color:'#c084fc',display:'inline-flex',alignItems:'center',gap:4,cursor:'default',
          }
        },
          e('span', null, soulEvolved ? '✦' : '✦'),
          e('span', null, soulEvolved ? 'SOUL evolved' : 'Learned'),
        ),
        e('button', {
          className: 'result-action' + (feedback==='up' ? ' active' : ''),
          onClick: handleThumbsUp,
          title: autoLearned ? 'Already auto-saved — click to boost quality score' : 'Mark correct — saves as training example',
          style: feedback==='up' ? {color:'var(--green)',borderColor:'var(--green)'} : {},
        }, feedback==='up' ? '✓ Correct' : autoLearned ? '👍 Boost' : '👍'),
        e('button', {
          className: 'result-action' + (feedback==='down' ? ' active' : ''),
          onClick: feedback==='down' && showCorrection ? ()=>setShowCorrection(false) : handleThumbsDown,
          title: correctionSaved ? 'Agent learned from this correction' : 'Mark wrong — teach the Learn Agent',
          style: correctionSaved
            ? {color:'#c084fc', borderColor:'rgba(192,132,252,0.4)'}
            : feedback==='down' ? {color:'var(--red-text)',borderColor:'var(--red)'} : {},
        }, correctionSaved ? '✦ Taught' : feedback==='down' ? '✕ Wrong' : '👎'),
      ),
    ),

    // ── Trace-aware correction panel — 2-step: identify → regenerate → review → save ──
    showCorrection && e('div', {className:'card card-static', style:{
      padding:16, marginTop:8,
      borderLeft:'3px solid rgba(239,68,68,0.5)',
      background:'rgba(239,68,68,0.03)',
    }},

      // ── STEP 1: Identify ─────────────────────────────────────────────────
      correctionStep === 'identify' && e('div', null,
        e('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}},
          e('div', {style:{fontSize:13,fontWeight:600,color:'#ef4444'}}, '↩ Teach the Learn Agent'),
          e('div', {style:{
            fontSize:10, padding:'2px 8px', borderRadius:10,
            background:'rgba(239,68,68,0.1)', color:'#ef4444',
            fontFamily:'var(--font-mono)',
          }}, 'Step 1 of 2 — Identify'),
        ),
        e('div', {style:{fontSize:12,color:'var(--text-secondary)',marginBottom:14}},
          'Tell the Learn Agent what was wrong. It will regenerate the SQL and show you the improved result before saving.'
        ),

        // Which pipeline step failed
        traceNodes.length > 0 && e('div', {style:{marginBottom:12}},
          e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}, 'Which step went wrong?'),
          e('div', {style:{display:'flex',flexWrap:'wrap',gap:5}},
            traceNodes.map(n =>
              e('button', {key:n.node_id, onClick:()=>setFailedNode(failedNode===n.node_key?'':n.node_key),
                style:{fontSize:11,padding:'3px 9px',borderRadius:6,cursor:'pointer',transition:'all 120ms',
                  border: failedNode===n.node_key ? '1px solid rgba(239,68,68,0.6)' : '1px solid var(--glass-border)',
                  background: failedNode===n.node_key ? 'rgba(239,68,68,0.12)' : 'var(--glass)',
                  color: failedNode===n.node_key ? '#ef4444' : 'var(--text-secondary)',
                }}, n.name)
            ),
            e('button', {onClick:()=>setFailedNode(failedNode==='unknown'?'':'unknown'),
              style:{fontSize:11,padding:'3px 9px',borderRadius:6,cursor:'pointer',transition:'all 120ms',
                border: failedNode==='unknown' ? '1px solid rgba(239,68,68,0.6)' : '1px solid var(--glass-border)',
                background: failedNode==='unknown' ? 'rgba(239,68,68,0.12)' : 'var(--glass)',
                color: failedNode==='unknown' ? '#ef4444' : 'var(--text-secondary)',
              }}, 'Not sure'),
          ),
        ),

        // What kind of error
        e('div', {style:{marginBottom:12}},
          e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}, 'What kind of error?'),
          e('div', {style:{display:'flex',flexWrap:'wrap',gap:5}},
            [{key:'wrong_tables',label:'Wrong tables'},{key:'wrong_columns',label:'Wrong columns'},
             {key:'wrong_filter',label:'Wrong filter'},{key:'wrong_logic',label:'Wrong logic'},
             {key:'wrong_aggregation',label:'Wrong aggregation'}].map(ft =>
              e('button', {key:ft.key, onClick:()=>setFailureType(failureType===ft.key?'':ft.key),
                style:{fontSize:11,padding:'3px 9px',borderRadius:6,cursor:'pointer',transition:'all 120ms',
                  border: failureType===ft.key ? '1px solid rgba(239,68,68,0.6)' : '1px solid var(--glass-border)',
                  background: failureType===ft.key ? 'rgba(239,68,68,0.12)' : 'var(--glass)',
                  color: failureType===ft.key ? '#ef4444' : 'var(--text-secondary)',
                }}, ft.label)
            ),
          ),
        ),

        // Describe what was wrong
        e('div', {style:{fontSize:11,color:'var(--text-muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.06em'}}, 'Describe (optional)'),
        e('textarea', {
          placeholder:'e.g. "RestOfASEAN is not a real country — exclude regional aggregates like RestOf*, APAC, SEA from Country."',
          value:correctionNote, onChange:ev=>setCorrectionNote(ev.target.value),
          style:{width:'100%',minHeight:56,background:'var(--glass)',border:'1px solid var(--glass-border)',
            borderRadius:8,color:'var(--text)',padding:'7px 10px',fontSize:12,resize:'vertical',
            fontFamily:'var(--font-ui)',marginBottom:12,boxSizing:'border-box'},
        }),

        e('div', {style:{display:'flex',gap:8,alignItems:'center'}},
          e('button', {
            onClick: runRegenerate,
            disabled: !correctionNote.trim() && !failureType && !failedNode,
            style:{
              fontSize:13, padding:'7px 18px', borderRadius:8, cursor:'pointer', border:'none',
              background: (!correctionNote.trim() && !failureType && !failedNode)
                ? 'rgba(239,68,68,0.3)' : '#ef4444',
              color:'#fff', fontWeight:600, transition:'all 150ms',
              opacity: (!correctionNote.trim() && !failureType && !failedNode) ? 0.5 : 1,
            },
          }, '→ Regenerate SQL'),
          e('button', {
            style:{fontSize:12,padding:'7px 12px',borderRadius:8,cursor:'pointer',
              border:'1px solid var(--glass-border)',background:'transparent',color:'var(--text-secondary)'},
            onClick:()=>setShowCorrection(false),
          }, 'Cancel'),
